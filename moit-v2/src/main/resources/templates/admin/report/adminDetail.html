<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{admin/layouts/adminLayout}">
<!--    #1. layout 렌더링    -->
<head lang="ko">
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/adminStyle.css}">
</head>
<body>
	<div layout:fragment="content">
		<!-- 각자파트 -->


<div class="admin-detail-page"> 

	<section class="admin-detail-card">
		<div class="admin-detail-card-head">
			<div class="admin-detail-card-title">
				관리자 신고 상세
			</div>
		</div>

		<div class="admin-detail-inner">
			<div class="admin-detail-summary-grid">
				<div class="admin-detail-summary-card">
					<div class="admin-detail-summary-label">신고번호</div>
					<div class="admin-detail-summary-value"
						th:text="${dto.reportId}"></div>
				</div>

				<div class="admin-detail-summary-card">
					<div class="admin-detail-summary-label">대상</div>
					<div class="admin-detail-summary-value"
						th:text="${dto.targetType} + ' ' + ${dto.targetId} + '번 글'"></div>
				</div>

				<div class="admin-detail-summary-card">
					<div class="admin-detail-summary-label">신고자 ID</div>
					<div class="admin-detail-summary-value"
						th:text="${dto.memberId}"></div>
				</div>

				<div class="admin-detail-summary-card">
					<div class="admin-detail-summary-label">현재 상태</div>
					<div class="admin-detail-summary-value">
					
						<span th:if="${dto.status == 'PENDING'}"
							class="admin-detail-status pending"
							th:text="${dto.status}">
						</span>
						<span th:if="${dto.status == 'APPROVED'}"
							class="admin-detail-status approved"
							th:text="${dto.status}">
						</span>
						<span th:if="${dto.status == 'REJECTED'}"
							class="admin-detail-status rejected"
							th:text="${dto.status}">
						</span>
						
					</div>
				</div>
			</div>

			<div class="admin-detail-grid">
				<div class="admin-detail-row">
					<div class="admin-detail-label">신고 대상 ID (닉네임)</div>
					<div class="admin-detail-value"
						th:text="|${dto.targetMemberId} ( ${dto.targetNickname} )|"></div>
				</div>
				
				<div class="admin-detail-row">
					<div class="admin-detail-label">신뢰도 점수 (뱃지)</div>
					<div class="admin-detail-value"
						th:text="|${dto.trustScore}점 ( ${dto.statusName} )|"></div>
				</div>
			
				<div class="admin-detail-row">
					<div class="admin-detail-label">신고 대상</div>
					<div class="admin-detail-value"
						th:text="|${dto.targetType} ${dto.targetId}번 글|"></div>
				</div>

				<div class="admin-detail-row">
					<div class="admin-detail-label">신고 사유</div>
					<div class="admin-detail-value"
						th:text="${dto.reasonCode}"></div>
				</div>

				<div class="admin-detail-row">
					<div class="admin-detail-label">상세 내용</div>
					<div class="admin-detail-value"
						th:text="${dto.reasonDetail}"></div>
				</div>

				<div class="admin-detail-row">
					<div class="admin-detail-label">신고일</div>
					<div class="admin-detail-value"
						th:text="|${dto.createdAt}"></div>
				</div>
				
				<div th:if="${dto.updatedAt != null}">
					<div class="admin-detail-row">
						<div class="admin-detail-label">수정일자</div>
						<div class="admin-detail-value"
							th:text="${dto.updatedAt}"></div>
					</div>
				</div>
				
				
			</div>
		</div>

		<div class="admin-detail-actions">
		    <a th:href="@{/admin/report/adminList}"
		       class="admin-detail-btn admin-detail-btn-white">
		        목록
		    </a>
		
		    <a th:if="${dto.targetType == 'MEETUP'}"
		       th:href="@{/meetup/detail(meetupId=${dto.targetId})}"
		       class="admin-detail-btn admin-detail-btn-soft-blue">
		        해당 글 보기
		    </a>
		
		    <a th:if="${dto.targetType == 'REVIEW'}"
		       th:href="@{/meetup/detail(meetupId=${dto.targetId})}"
		       class="admin-detail-btn admin-detail-btn-soft-blue">
		        해당 글 보기
		    </a>
		
		    <form th:if="${dto.status == 'PENDING'}"
		          th:action="@{/admin/report/update}"
		          method="post">
		
		        <input type="hidden"
		               th:name="${_csrf.parameterName}"
		               th:value="${_csrf.token}" />
		
		        <input type="hidden"
		               name="reportId"
		               th:value="${dto.reportId}" />
		
		        <input type="hidden"
		               name="status"
		               value="APPROVED" />
		
		        <button type="submit"
		                class="admin-detail-btn admin-detail-btn-blue">
		            처리 완료
		        </button>
		    </form>
		
		    <form th:if="${dto.status == 'PENDING'}"
		          th:action="@{/admin/report/update}"
		          method="post">
		
		        <input type="hidden"
		               th:name="${_csrf.parameterName}"
		               th:value="${_csrf.token}" />
		
		        <input type="hidden"
		               name="reportId"
		               th:value="${dto.reportId}" />
		
		        <input type="hidden"
		               name="status"
		               value="REJECTED" />
		
		        <button type="submit"
		                class="admin-detail-btn admin-detail-btn-blue">
		            반려 완료
		        </button>
		    </form>
		
		    <form th:action="@{/admin/report/delete}"
		          method="post"
		          onsubmit="return confirm('삭제하시겠습니까?');">
		
		        <input type="hidden"
		               th:name="${_csrf.parameterName}"
		               th:value="${_csrf.token}" />
		
		        <input type="hidden"
		               name="reportId"
		               th:value="${dto.reportId}" />
		
				<!-- confirm delete 
		        <button type="submit"
		                class="admin-detail-btn admin-detail-btn-red">
		            삭제
		        </button> -->

				<!-- modal delete -->
		 		<button type="button"
						class="admin-detail-btn admin-detail-btn-red"
						data-bs-toggle="modal"
						data-bs-target="#deleteModal">삭제
				</button> 
		    </form>
		
		</div>
		
	</form>

		</div>
	</section>


	<!-- 삭제 확인 모달 -->
	<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content admin-detail-delete-modal-box">

				<div class="modal-body admin-detail-delete-modal-body">
					<h2 class="admin-detail-delete-modal-title">삭제하시겠습니까?</h2>

					<form th:action="@{/admin/report/delete}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" th:name="reportId" th:value="${dto.reportId}" />

						<div class="admin-detail-delete-modal-actions">
							<button type="button"
									class="admin-detail-btn admin-detail-btn-white"
									data-bs-dismiss="modal">취소</button>

							<button type="submit"
									class="admin-detail-btn admin-detail-btn-red-fill">삭제</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div> 
	
	


</div>

			</div>
	<th:block th:replace="~{user/fragments/footer :: footer}" />
</body>
</html>
