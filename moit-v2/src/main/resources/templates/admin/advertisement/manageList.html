<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/adminLayout}"> <!-- 1. th:replace 대신 layout:decorate 사용 -->
<head>
    <title>광고 관리</title>
</head>
<body>

    <!-- 2. 레이아웃의 content 자리에 들어갈 본문 내용을 정의 -->
    <div layout:fragment="content">

		<h2>광고 관리</h2>
		
		<!-- 탭 -->
		<div class="mb-3">
		    <a class="btn btn-sm"
			   th:classappend="${tab == 'approval'} ? 'btn-primary' : 'btn-secondary'"
			   th:href="@{/admin/advertisement/manageList(tab='approval')}">
			    승인 관리
			</a>
			
			<a class="btn btn-sm"
			   th:classappend="${tab == 'extension'} ? 'btn-primary' : 'btn-secondary'"
			   th:href="@{/admin/advertisement/manageList(tab='extension')}">
			    연장 신청
			</a>
			
			<a class="btn btn-sm"
			   th:classappend="${tab == 'status'} ? 'btn-primary' : 'btn-secondary'"
			   th:href="@{/admin/advertisement/manageList(tab='status')}">
			    운영 관리
			</a>
			
			<a class="btn btn-sm btn-primary"
			   th:href="@{/admin/advertisement/statistics}">
			    📊 통계 대시보드
			</a>
		</div>
		
		<!-- 승인 관리 탭 -->
		<div th:if="${tab == 'approval'}">
		
			<div class="mb-4">
				<div class="col-md-3">
				    <div class="card-box">
				        <h6>승인 대기</h6>
				        <div class="stat-number" th:text="${waitingCnt}"></div>
				    </div>
				</div>
			</div>
				    
		    <!-- 승인 관리 검색 -->
			<div class="table-box mb-3">
			
			    <form method="get" th:action="@{/admin/advertisement/manageList}">
			
			        <input type="hidden" name="tab" value="approval"/>
			
			        <div class="row">
			
			            <div class="col-md-5">
			                <input type="text"
			                       name="searchText"
			                       class="form-control"
			                       placeholder="광고명 검색"
			                       th:value="${dto.searchText}">
			            </div>
			
			            <div class="col-md-2">
			                <button type="submit" class="btn btn-primary">검색</button>
			            </div>
			
			        </div>
			        
			        <div class="col-md-3 my-3">
		
					    <select class="form-select"
					            name="sort"
					            onchange="this.form.submit()">
					
					        <option value=""
					            th:selected="${search.sort == null or search.sort == ''}">
					            최신 등록순
					        </option>
					
					
					        <option value="start"
					            th:selected="${search.sort == 'start'}">
					            시작 예정순
					        </option>					
					
					        <option value="budget"
					            th:selected="${search.sort == 'budget'}">
					            예산 높은순
					        </option>
					
					    </select>
					
					</div>
			
			    </form>
			
			</div>
						
		    <h4>광고 승인 관리</h4>
		
		    <table class="table table-hover align-middle">
			    <thead>
				    <tr>
				        <th style="width:8%;">번호</th>
				        <th style="width:10%;">이미지</th>
				        <th style="width:25%;">광고명</th>
				        <th style="width:10%;">유형</th>
				        <th style="width:10%;">상태</th>
				        <th style="width:15%;">기간</th>
				        <th style="width:10%;">관리</th>
				    </tr>
			    </thead>
			
				<tbody>
				    <tr th:each="ad, stat : ${list}">
				        
				        <!-- 번호 -->
				        <td th:text="${(dto.page - 1) * dto.size + stat.index + 1}"></td>
				
				        <!-- 이미지 -->
				        <td>
						    <img th:if="${ad.imageList != null and !#lists.isEmpty(ad.imageList)}"
						         th:src="${ad.imageList[0].imageUrl}"
						         style="width:70px;height:45px;object-fit:cover;border-radius:6px;">
						</td>
				
				        <!-- 광고명 -->
				        <td th:text="${ad.title}"></td>
				
				        <!-- 유형 -->
				        <td th:text="${ad.adChannel}"></td>
				
				        <!-- 상태 -->
				        <td th:text="${ad.approvalStatus}"></td>
				
				        <!-- 기간 -->
				        <td>
				            <span th:text="${#temporals.format(ad.startDatetime,'yyyy-MM-dd')}"></span>
				            ~
				            <span th:text="${#temporals.format(ad.endDatetime,'yyyy-MM-dd')}"></span>
				        </td>
				
				        <!-- 관리 (승인 버튼) -->
				        <td>
				        	<div class="d-flex gap-1">
						        <a class="btn btn-sm btn-primary"
						           th:href="@{/admin/advertisement/detail(adId=${ad.adId}, mode='approval')}">
						            상세
						        </a>
					            <form th:action="@{/admin/advertisement/approve}" method="post">
					                <input type="hidden" name="adId" th:value="${ad.adId}"/>
					                <button type="submit" class="btn btn-sm btn-success">승인</button>
					            </form>
				            </div>
				        </td>
				
				    </tr>
			    </tbody>
			</table>
		
		</div>
		
		<!-- 연장 신청 관리 -->

		<div th:if="${tab == 'extension'}">

			<h4>광고 연장 신청 관리</h4>

			<table class="table table-hover">

				<thead>
					<tr>
						<th>번호</th>
						<th>광고명</th>
						<th>광고주</th>
						<th>현재 종료일</th>
						<th>변경 종료일</th>
						<th>신청일</th>
						<th>관리</th>
					</tr>
				</thead>

				<tbody>

					<tr th:each="ad, stat : ${list}">

						<td th:text="${stat.index+1}"></td>

						<td th:text="${ad.title}"></td>

						<td th:text="${ad.nickname}"></td>

						<td th:text="${#temporals.format(ad.endDatetime,'yyyy-MM-dd')}"></td>

						<td
							th:text="${#temporals.format(ad.extensionRequestEndDatetime,'yyyy-MM-dd')}"></td>

						<td
							th:text="${#temporals.format(ad.updatedAt,'yyyy-MM-dd')}"></td>

						<td>

							<form th:action="@{/admin/advertisement/extensionApprove}"
								method="post">

								<input type="hidden" name="adId" th:value="${ad.adId}">

								<button class="btn btn-success btn-sm">승인</button>

							</form>
							
							<form th:action="@{/admin/advertisement/extensionReject}"
								method="post">

								<input type="hidden" name="adId" th:value="${ad.adId}">

								<button class="btn btn-danger btn-sm">반려</button>

							</form>

						</td>

					</tr>

				</tbody>

			</table>


		</div>

		<!-- 운영 관리 탭 -->
		<div th:if="${tab == 'status'}">
		
		<!-- 통계 -->
	    <div class="row mb-4">
	
	        <div class="col-md-3">
	            <div class="card-box">
	                <h6>전체 광고</h6>
	                <div class="stat-number" th:text="${totalAdCnt}">0</div>
	            </div>
	        </div>
	
	        <div class="col-md-3">
	            <div class="card-box">
	                <h6>진행중</h6>
	                <div class="stat-number" th:text="${openCnt}"></div>
	            </div>
	        </div>
	
	        <div class="col-md-3">
	            <div class="card-box">
	                <h6>대기</h6>
	                <div class="stat-number" th:text="${pendingCnt}"></div>
	            </div>
	        </div>
	
	        <div class="col-md-3">
	            <div class="card-box">
	                <h6>종료</h6>
	                <div class="stat-number" th:text="${closedCnt}"></div>
	            </div>
	        </div>
	
	    </div>		
		    <!-- 검색 -->
	        <div class="table-box mb-3">
	
	            <form method="get" th:action="@{/admin/advertisement/manageList}">
	
	                <input type="hidden" name="tab" value="status"/>
	
	                <div class="row">
	
	                    <div class="col-md-5">
	                        <input type="text"
	                               name="searchText"
	                               class="form-control"
	                               placeholder="광고명 검색"
	                               th:value="${dto.searchText}">
	                    </div>
	
	                    <div class="col-md-3">
	                        <select name="status" class="form-select">
	                            <option value="">전체</option>
	                            <option value="OPEN" th:selected="${param.status=='OPEN'}">OPEN</option>
	                            <option value="PENDING">PENDING</option>
	                            <option value="CLOSED">CLOSED</option>
	                        </select>
	                    </div>
	
	                    <div class="col-md-2">
	                        <button type="submit" class="btn btn-primary">검색</button>
	                    </div>
	
	                </div>
	                
	                
	                
			        <div class="col-md-3 my-3">
		
					    <select class="form-select"
					            name="sort"
					            onchange="this.form.submit()">
					
					        <option value=""
					            th:selected="${search.sort == null or search.sort == ''}">
					            최신 등록순
					        </option>					
					
					        <option value="recommend"
					            th:selected="${search.sort == 'recommend'}">
					            추천순
					        </option>					
					
					        <option value="start"
					            th:selected="${search.sort == 'start'}">
					            시작 예정순
					        </option>					
					
					        <option value="end"
					            th:selected="${search.sort == 'end'}">
					            종료 임박순
					        </option>					
					
					        <option value="budget"
					            th:selected="${search.sort == 'budget'}">
					            예산 높은순
					        </option>
					        
					        <option value="grade"
					            th:selected="${search.sort == 'grade'}">
					            등급순
					        </option>					
					    </select>
					
					</div>
	
	            </form>
	
	        </div>
	        	        
	        
		    <h4>광고 게시 관리</h4>
		
		    <table class="table table-hover align-middle">
		    	<thead>
				    <tr>
				        <th>번호</th>
				        <th>이미지</th>
				        <th>광고명</th>
				        <th>유형</th>
				        <th>상태</th>
				        <th>기간</th>
				        <th>노출수</th>
				        <th>클릭수</th>
				        <th>피로도</th>
				        <th>관리</th>
				    </tr>
				</thead>
			
				<tbody>
				    <tr th:each="ad, stat : ${list}">
				
				        <!-- 번호 -->
				        <td th:text="${(dto.page - 1) * dto.size + stat.index + 1}"></td>
				
				        <!-- 이미지 -->
				        <td>
						    <img th:if="${ad.imageList != null and !#lists.isEmpty(ad.imageList)}"
						         th:src="${ad.imageList[0].imageUrl}"
						         style="width:70px;height:45px;object-fit:cover;border-radius:6px;">
						</td>
				
				        <!-- 광고명 -->
				        <td th:text="${ad.title}"></td>
				
				        <!-- 유형 -->
				        <td th:text="${ad.adChannel}"></td>
				
				        <!-- 상태 -->
				        <td>
						    <form th:action="@{/admin/advertisement/status}" method="post">
						
						        <input type="hidden" name="adId" th:value="${ad.adId}"/>
						
						        <select name="status"
						                class="form-select form-select-sm status-select"
						                th:classappend="${ad.status == 'OPEN'} ? ' status-open' :
						                               (${ad.status == 'PENDING'} ? ' status-pending' :
						                               ' status-closed')"
						                onchange="this.form.submit()">
						
						            <option value="OPEN"
						                    th:selected="${ad.status == 'OPEN'}">
						                OPEN
						            </option>
						
						            <option value="PENDING"
						                    th:selected="${ad.status == 'PENDING'}">
						                PENDING
						            </option>
						
						            <option value="CLOSED"
						                    th:selected="${ad.status == 'CLOSED'}">
						                CLOSED
						            </option>
						
						        </select>
						
						    </form>
						</td>
				
				        <!-- 기간 -->
				        <td>
				            <span th:text="${#temporals.format(ad.startDatetime,'yyyy-MM-dd')}"></span>
				            ~
				            <span th:text="${#temporals.format(ad.endDatetime,'yyyy-MM-dd')}"></span>
				        </td>
				
				        <!-- 노출수 -->
				        <td th:text="${ad.impressions}"></td>
				
				        <!-- 클릭수 -->
				        <td th:text="${ad.clicks}"></td>
				        
				        <!-- 피로도 -->
				        <td>
						    <div th:if="${ad.fatigueScore != null}">
						        <div class="fw-bold"
						             th:text="${#numbers.formatDecimal(ad.fatigueScore,1,1) + '점'}">
						        </div>
						
						        <span class="badge bg-success"
						              th:if="${ad.fatigueStatus == '정상'}">
						            🟢 정상
						        </span>
						
						        <span class="badge bg-warning text-dark"
						              th:if="${ad.fatigueStatus == '관심'}">
						            🟡 관심
						        </span>
						
						        <span class="badge bg-danger"
						              th:if="${ad.fatigueStatus == '교체 권장'}">
						            🔴 교체 권장
						        </span>					
						    </div>
						    						
						    <span th:if="${ad.fatigueScore == null}">
						        -
						    </span>
						</td>
				
				        <!-- 관리 (상세 버튼) -->
				        <td>
				            <a class="btn btn-sm btn-primary"
				               th:href="@{/admin/advertisement/detail(adId=${ad.adId}, mode='status')}">
				                상세
				            </a>
				        </td>
				
				    </tr>
				</tbody>
			</table>
		
		</div>
		
		<!-- 페이징 (JSP 스타일 유지) -->
	    <nav class="mt-4" th:if="${totalPage > 0}">
	        <ul class="pagination justify-content-center">
	
	            <li class="page-item" th:classappend="${dto.page <= 1} ? 'disabled'">
	                <a class="page-link"
	                   th:href="@{/admin/advertisement/manageList(page=${startPage - 1}, tab=${tab})}">
	                    이전
	                </a>
	            </li>
	
	            <li class="page-item"
	                th:each="i : ${#numbers.sequence(startPage,endPage)}"
	                th:classappend="${dto.page == i} ? 'active'">
	
	                <a class="page-link"
	                   th:text="${i}"
	                   th:href="@{/admin/advertisement/manageList(page=${i}, tab=${tab})}">
	                </a>
	
	            </li>
	
	            <li class="page-item" th:classappend="${dto.page >= totalPage} ? 'disabled'">
	                <a class="page-link"
	                   th:href="@{/admin/advertisement/manageList(page=${endPage + 1}, tab=${tab})}">
	                    다음
	                </a>
	            </li>
	
	        </ul>
	    </nav>
		
	</div>
</body>
</html>
