<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
	<th:block th:fragment="mainHeader">
		<header>
			<div class="container header-inner">
    <!-- 좌측 로고 + 메뉴 -->
    <div class="left-group">
        <a th:href="@{/}" class="logo">
            MOIT
        </a>

        <nav>
            <a th:href="@{/meetup/user/list}"
               th:classappend="${menu == 'meetup'} ? 'active' : ''">
                모집찾기
            </a>

            <a class="inquiry-btn"
               th:href="@{/questions/adminWrite(category='ADMIN')}">
                💬 관리자 1:1 문의
            </a>
        </nav>
    </div>

    <!-- 우측 그룹 -->
    

        <div class="header-slogan">
            <span>우리들의 취향 맞춤 소모임 플랫폼</span>
        </div>
        
		<div class="header-right">
        <nav>

            <!-- 로그인 안한 상태 -->
            <div sec:authorize="isAnonymous()">
                <a class="nav-link inquiry-btn"
                   th:href="@{/user/login}">
                    로그인
                </a>

                <a class="nav-link inquiry-btn"
                   th:href="@{/user/join}">
                    회원가입
                </a>
            </div>

            <!-- 로그인한 상태 -->
            <div sec:authorize="isAuthenticated()">

                <a th:href="@{/meetup/mypage/meetup}">
                    <div class="profile">

                        <div class="profile-img"
                             th:text="${#strings.substring(#authentication.principal.dto.nickname,0,1)}">
                        </div>

                        <div class="profile-info">

                            <strong th:text="${#authentication.principal.dto.nickname + '님'}">
                            </strong>

                            <span th:switch="${#authentication.principal.dto.typeName}">

                                <span th:case="'ROLE_MEMBER'">
                                    일반회원
                                </span>

                                <span th:case="'ROLE_PARTNER'">
                                    제휴업체
                                </span>

                                <span th:case="'ROLE_ADMIN'">
                                    관리자
                                </span>

                                <span th:case="*"
                                      th:text="${#authentication.principal.dto.typeName}">
                                </span>

                            </span>

                        </div>
                    </div>
                </a>

                <!-- 로그아웃 -->
                <form th:action="@{/user/logout}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="submit"
                           value="로그아웃"
                           class="btn btn-danger">
                </form>

            </div>

        </nav>
    </div>
</div>
</header>
		
	</th:block>
</body>
</html>
