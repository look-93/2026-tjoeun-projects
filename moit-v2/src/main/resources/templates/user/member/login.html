<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/memberStyle.css}">
</head>
<body>

<!-- Header -->
<div th:replace="~{user/fragments/mainHeader :: mainHeader}"></div>
	    <div th:if="${errorMessage}" class="alert alert-info alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
	<div class="container">	
	    <section class="auth-box">	
	        <div class="tab-menu">
	            <button type="button" class="tab-btn active" data-tab="general">
	                일반회원 로그인
	            </button>
	
	            <button type="button" class="tab-btn" data-tab="admin">
	                관리자 로그인
	            </button>
	        </div>
	
	        <!-- 일반회원 -->
	        <div class="tab-content active"
	             id="general">
	
	            <form th:action="@{/login}" method="post">	
	                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">	
	                <input type="hidden" name="loginType" value="USER">                

	                <div class="form-options member-type">	
	                    <label>
	                        <input type="radio" name="memberTypeId" value="1" checked>
	                        일반회원
	                    </label>
	
	                    <label>
	                        <input type="radio" name="memberTypeId" value="2">
	                        제휴업체
	                    </label>	
	                </div>
	
	                <div class="form-group">
	                    <input type="text" th:value="${cookie != null and cookie.rememberId != null ? cookie.rememberId.value : ''}" name="username" placeholder="아이디">
	                </div>
	
	                <div class="form-group">
	                    <input type="password" name="password" placeholder="비밀번호">
	                </div>
	
	                <div class="form-options">
	                    <label>
	                        <input type="checkbox" name="rememberId">
	                        아이디 저장
	                    </label>
	                </div>	
	                <button type="submit" class="btn btn-primary full">
	                    로그인
	                </button>
	
	                <div class="auth-links">	
	                    <div class="link-row">
	                        <a th:href="@{/user/member/findId}">
	                            아이디 찾기
	                        </a>
	                        |
	                        <a th:href="@{/user/member/findPassword}">
	                            비밀번호 찾기
	                        </a>
	                    </div>
	
	                    <hr>
	
	                    <div class="link-row">
	                        <span>계정이 없으신가요?</span>	
	                        <a th:href="@{/user/member/join}">
	                            회원가입
	                        </a>
	                    </div>	
	                </div>	
	            </form>	
	        </div>
	
	        <!-- 관리자 -->
	        <div class="tab-content" id="admin">	
	            <form th:action="@{/login}" method="post">	
	                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">	
	                <input type="hidden" name="loginType" value="ADMIN">
	
	                <div class="form-group">
	                    <input type="text" name="username" placeholder="관리자 아이디">
	                </div>
	
	                <div class="form-group">
	                    <input type="password" name="password" placeholder="비밀번호">
	                </div>
	                
	                <div class="form-options">
	                    <label>
	                        <input type="checkbox" name="rememberId">
	                        아이디 저장
	                    </label>
	                </div>
	
	                <button type="submit" class="btn btn-primary full">
	                    관리자 로그인
	                </button>
	                
	                <div class="auth-links">	
	                    <div class="link-row">
	                        <a th:href="@{/user/find-id}">
	                            아이디 찾기
	                        </a>
	                        |
	                        <a th:href="@{/user/find-password}">
	                            비밀번호 찾기
	                        </a>
	                    </div>
	
	                    <hr>
	
	                    <div class="link-row">
	                        <span>계정이 없으신가요?</span>
	
	                        <a th:href="@{/user/member/join}">
	                            회원가입
	                        </a>
	                    </div>	
	                </div>	
	            </form>	
	        </div>	
	    </section>	
	</div>

<!-- Footer -->
<div th:replace="~{user/fragments/footer :: footer}"></div>

	<script>
	
		const tabBtns=document.querySelectorAll(".tab-btn");
		const tabContents=document.querySelectorAll(".tab-content");
		
		tabBtns.forEach(btn=>{
		
		    btn.addEventListener("click",()=>{
		
		        tabBtns.forEach(b=>b.classList.remove("active"));
		        tabContents.forEach(c=>c.classList.remove("active"));
		
		        btn.classList.add("active");
		        document.getElementById(btn.dataset.tab)
		                .classList.add("active");
		
		    });
		
		});
	
	</script>

</body>
</html>
