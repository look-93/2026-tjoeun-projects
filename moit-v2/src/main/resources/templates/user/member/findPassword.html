<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>비밀번호 찾기</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/memberStyle.css}">
</head>
<body>

<div th:replace="~{user/fragments/mainHeader :: mainHeader}"></div>

<div class="auth-box">

    <h2>비밀번호 찾기</h2>

    <p class="hint" style="text-align:center; margin-bottom:25px;">
        가입한 정보를 입력한 후 새로운 비밀번호를 설정해주세요.
    </p>

    <form id="findPwForm"
          th:action="@{/user/member/findPassword}"
          method="post">

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <!-- 아이디 -->
        <div class="form-group">
            <input type="text"
                   id="loginId"
                   name="loginId"
                   placeholder="아이디"
                   required>
        </div>

        <!-- 이메일 -->
        <div class="form-group">
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="이메일"
                   required>
        </div>

        <!-- 휴대폰 -->
        <div class="form-group">
            <input type="tel"
                   id="mobile"
                   name="mobile"
                   placeholder="휴대폰 번호"
                   required>

            <div class="hint">
                '-' 없이 숫자만 입력해주세요.
            </div>
        </div>

        <button class="btn btn-primary">
        	다음
    	</button>

    </form>

    <div class="auth-links"
         style="justify-content:center; margin-top:20px;">

        <a th:href="@{/user/member/login}">
            로그인
        </a>

        <span>|</span>

        <a th:href="@{/user/member/findId}">
            아이디 찾기
        </a>

        <span>|</span>

        <a th:href="@{/user/member/join}">
            회원가입
        </a>

    </div>

</div>

<div th:replace="~{user/fragments/footer :: footer}"></div>


</body>
</html>
