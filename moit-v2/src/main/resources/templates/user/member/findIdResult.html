<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>아이디 찾기 결과</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/memberStyle.css}">

</head>
<body>

<div th:replace="~{user/fragments/mainHeader :: mainHeader}"></div>

	<div class="auth-box">
	
	    <h2>아이디 찾기 결과</h2>
	
	    <!-- 조회 성공 -->
	    <div th:if="${user != null}">
	
	        <p class="hint" style="text-align:center; margin-bottom:25px;">
	            회원님의 아이디입니다.
	        </p>
	
	        <div class="form-group">
	            <input type="text"
	                   th:value="${user.loginId}"
	                   readonly>
	        </div>
	
	        <button type="button"
	                class="btn btn-primary"
	                th:onclick="|location.href='@{/user/member/login}'|">
	            로그인
	        </button>
	
	        <button type="button"
	                class="btn"
	                style="margin-top:10px;"
	                th:onclick="|location.href='@{/user/member/findPassword}'|">
	            비밀번호 찾기
	        </button>
	
	    </div>
	
	    <!-- 조회 실패 -->
	    <div th:unless="${user != null}">
	
	        <p class="text-danger"
	           style="text-align:center; margin:30px 0;">
	            입력하신 정보와 일치하는 회원이 없습니다.
	        </p>
	
	        <button type="button"
	                class="btn btn-primary"
	                th:onclick="|location.href='@{/user/member/findId}'|">
	            다시 찾기
	        </button>
	
	        <button type="button"
	                class="btn"
	                style="margin-top:10px;"
	                th:onclick="|location.href='@{/user/member/join}'|">
	            회원가입
	        </button>
	
	    </div>
	
	</div>

<div th:replace="~{user/fragments/footer :: footer}"></div>

</body>
</html>
