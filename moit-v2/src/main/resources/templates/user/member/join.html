<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>회원가입</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/memberStyle.css}">
</head>
<body>

<div th:replace="~{user/fragments/mainHeader :: mainHeader}"></div>

<div class="auth-box">

    <h2>회원가입</h2>

    <form id="joinForm" th:action="@{/user/member/join}" method="post">

        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- 아이디 -->
        <div class="form-group-inline"> 
        	<input type="text" 
        		   id="loginId" 
        		   name="loginId" 
        		   th:value="${dto != null ? dto.loginId : ''}"
        		   placeholder="아이디" required>
        </div>

        <div id="idCheck" class="target"></div>

        <!-- 비밀번호 -->
        <div class="form-group">
            <input type="password" id="password" name="password" placeholder="비밀번호" required>
        </div>
        
        <!-- 비밀번호 강도 -->
        <div class="strength-bar">
		    <div id="strengthFill"></div>		
		</div>
		
		<div id="strengthText" class="target"></div>
        
        <!-- 비밀번호 유출검사 -->
        <div id="passwordLeakCheck" class="target"></div>

        <div class="form-group">
            <input type="password" id="passwordCheck" placeholder="비밀번호 확인" required>
        </div>

        <div id="passCheck"></div>

        <!-- 닉네임 -->
        <div class="form-group-inline">
            <input type="text" 
            	   id="nickname" 
            	   name="nickname" 
            	   th:value="${dto != null ? dto.nickname : ''}"
            	   placeholder="닉네임" required>
        </div>

        <div id="nickCheck" class="target"></div>
        
        <div class="form-group">
	    <label class="form-title">성별</label>
	
	    	<div class="gender-select">
	
		        <input type="radio" id="male" name="gender" value="M" checked>
		        <label for="male" class="gender-card">
		            
		            <span class="gender-text">남성</span>
		        </label>
		
		        <input type="radio" id="female" name="gender" value="F">
		        <label for="female" class="gender-card">
		            
		            <span class="gender-text">여성</span>
		        </label>
		
		        <input type="radio" id="none" name="gender" value="N">
		        <label for="none" class="gender-card">
		            
		            <span class="gender-text">비공개</span>
		        </label>
	
		    </div>
		</div>
	
		<!-- 생년월일 -->
		<div class="form-group">
		    <input type="text" id="birth" name="birth" maxlength="6" placeholder="생년월일" required>
		
		    <div class="hint">
		        생년월일 6자리(YYMMDD)를 입력해주세요.
		    </div>
		
		    <div id="birthCheck" class="target"></div>
		</div>

        <!-- 이메일 -->
        <div class="form-group">
            <input type="email" 
            	   id="email" 
            	   name="email" 
            	   th:value="${dto != null ? dto.email : ''}"
            	   placeholder="이메일" required>
        </div>

        <!-- 휴대폰 -->
        <div class="form-group">
            <input type="tel" 
            	   id="mobile" 
            	   name="mobile"
            	   pattern="[0-9]{11}"
				   maxlength="11" 
            	   th:value="${dto != null ? dto.mobile : ''}"
            	   placeholder="전화번호" required>

            <div class="hint">
                '-' 없이 숫자만 입력해주세요.
            </div>
        </div>

        <!-- 회원 유형 -->
        <div class="form-options member-type">
            <label>
                <input type="radio" name="memberTypeId" value="1" checked>
                일반회원
            </label>

            <label>
                <input type="radio" name="memberTypeId" value="2">
                제휴업체
            </label>
        </div>

        <!-- 약관 -->
        <div class="form-options">
            <label>
                <input type="checkbox" id="agree" required>
                약관 및 개인정보처리방침 동의
            </label>
        </div>

        <button type="submit"
                class="btn btn-primary">
            회원가입
        </button>

    </form>

</div>

<div th:replace="~{user/fragments/footer :: footer}"></div>

	<script th:inline="javascript">
	
		const loginIdUrl = [[@{/user/member/checkLoginId}]];
		const nicknameUrl = [[@{/user/member/checkNickname}]];
		const loginPage = [[@{/user/member/login}]];
		const passwordUrl = [[@{/user/member/checkPassword}]];
		
		function checkDuplicate(inputId, targetId, url, message){
		
		    const input = document.getElementById(inputId);
		    const target = document.getElementById(targetId);
		
		    input.addEventListener("keyup", function(){
		
		        const value = this.value.trim();
		
		        if(value===""){
		            target.textContent = message + "을(를) 입력해주세요.";
		            target.className="target text-warning";
		            return;
		        }
		
		        fetch(url + "?" + input.name + "=" + encodeURIComponent(value))
		        .then(res=>res.json())
		        .then(data=>{		
		            if(data.exists){
		                target.textContent="이미 사용중인 " + message + "입니다.";
		                target.className="target text-danger";
		            }else{
		                target.textContent="사용 가능한 " + message + "입니다.";
		                target.className="target text-success";
		            }		
		        })
		        .catch(()=>{		
		            target.textContent="서버 오류가 발생했습니다.";
		            target.className="target text-warning";		
		        });		
		    });		
		}
		
		function checkPasswordLeak() {

		    const password = document.getElementById("password");
		    const target = document.getElementById("passwordLeakCheck");

		    let timer;
		    password.addEventListener("keyup", function () {
		        clearTimeout(timer);
		        const value = this.value.trim();

		        if (value.length < 8) {
		            target.textContent = "비밀번호는 8자 이상 입력해주세요.";
		            target.className = "target text-warning";
		            return;
		        }
		        timer = setTimeout(() => {
		            fetch(passwordUrl + "?password=" + encodeURIComponent(value))
		                .then(res => res.json())
		                .then(data => {
		                    if (data.error) {
		                        target.textContent = "비밀번호 보안 검사를 수행할 수 없습니다.";
		                        target.className = "target text-warning";
		                        return;
		                    }
		                    if (data.safe) {
		                        target.textContent = "안전한 비밀번호입니다.";
		                        target.className = "target text-success";
		                    } else {
		                    	target.innerHTML =
		                    	    "이 비밀번호는 <strong>" +
		                    	    data.count.toLocaleString() +
		                    	    "</strong>건의 데이터 유출에서 발견되었습니다.<br>" +
		                    	    "보안을 위해 다른 비밀번호를 사용해주세요.";
		                        target.className = "target text-danger";
		                    }
		                })
		                .catch(() => {
		                    target.textContent = "서버와 통신할 수 없습니다.";
		                    target.className = "target text-warning";
		                });
		        }, 500);
		    });
		}
		
		// 비밀번호 강도
		function checkPasswordStrength() {

		    const password = document.getElementById("password");
		    const fill = document.getElementById("strengthFill");
		    const text = document.getElementById("strengthText");

		    password.addEventListener("keyup", function () {

		    	const value = this.value;
		        let score = 0;

		        const rules = {
		            length: value.length >= 8,
		            upper: /[A-Z]/.test(value),
		            lower: /[a-z]/.test(value),
		            number: /[0-9]/.test(value),
		            special: /[!@#$%^&*()_\-+=<>?/]/.test(value)
		        };

		        if (rules.length) score++;
		        if (rules.upper) score++;
		        if (rules.lower) score++;
		        if (rules.number) score++;
		        if (rules.special) score++;

		        fill.style.width = (score * 20) + "%";

		        switch (score) {
		            case 0:
		            case 1:
		                fill.style.background = "#dc3545";
		                text.textContent = "매우 약함";
		                break;

		            case 2:
		                fill.style.background = "#fd7e14";
		                text.textContent = "약함";
		                break;

		            case 3:
		                fill.style.background = "#ffc107";
		                text.textContent = "보통";
		                break;

		            case 4:
		                fill.style.background = "#20c997";
		                text.textContent = "강함";
		                break;

		            case 5:
		                fill.style.background = "#198754";
		                text.textContent = "매우 강함";
		                break;
		        }
		    });
		}
		
		// 아이디 중복검사
		checkDuplicate( "loginId", "idCheck", loginIdUrl, "아이디" );
		
		// 닉네임 중복검사
		checkDuplicate( "nickname", "nickCheck", nicknameUrl, "닉네임" );
		
		// 비밀번호 유출검사
		checkPasswordLeak();
		
		// 비밀번호 강도
		checkPasswordStrength();
		
		// 비밀번호 확인
		const password=document.getElementById("password");
		const passwordCheck=document.getElementById("passwordCheck");
		const passTarget=document.getElementById("passCheck");
		
		passwordCheck.addEventListener("keyup",()=>{		
		    if(password.value===passwordCheck.value){		
		        passTarget.textContent="비밀번호가 일치합니다.";
		        passTarget.className="target text-success";		
		    }else{		
		        passTarget.textContent="비밀번호가 일치하지 않습니다.";
		        passTarget.className="target text-danger";		
		    }		
		});	
		
		
		
	</script>
	
	<script th:inline="javascript">
    const message = [[${msg}]];

    if (message != null) {
        alert(message);
    }
	</script>

</body>
</html>
