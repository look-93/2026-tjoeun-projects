<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/mypage/layouts/mypageLayout}">

<head>
<meta charset="UTF-8">
<title>비밀번호 변경</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mypage-main-content">
        <div class="mypage-user-info">
            <h2 class="member-edit-title">
                비밀번호 변경
            </h2>

            <!-- 오류 메시지 -->
            <div th:if="${msg != null}"
                 class="alert alert-danger"
                 th:text="${msg}">
            </div>

            <form class="member-edit-form password-change-form"
                  th:action="@{/user/member/passwordChange}"
                  method="post">
                <!-- CSRF -->
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="mypage-info-grid">
                    <!-- 현재 비밀번호 -->
                    <div class="form-group">
                        <div class="mypage-info-title">
                            현재 비밀번호
                        </div>

                        <input type="password"
                               name="currentPassword"
                               placeholder="현재 비밀번호 입력"
                               required>
                    </div>

                    <!-- 새 비밀번호 -->
					<div class="form-group">
					    <div class="mypage-info-title">
					        새 비밀번호
					    </div>
					
					    <input type="password"
					           id="newPassword"
					           name="newPassword"
					           placeholder="새 비밀번호 입력"
					           required>
					
					    <!-- 비밀번호 강도 -->
					    <div class="strength-bar">
					        <div id="strengthFill"></div>
					    </div>
					
					    <div id="strengthText" class="target"></div>
					
					    <!-- 비밀번호 유출 검사 -->
					    <div id="passwordLeakCheck" class="target"></div>
					</div>
					
					<!-- 새 비밀번호 확인 -->
					<div class="form-group">
					    <div class="mypage-info-title">
					        새 비밀번호 확인
					    </div>
					
					    <input type="password"
					           id="passwordCheck"
					           name="passwordCheck"
					           placeholder="새 비밀번호 확인"
					           required>
					
					    <div id="passwordMsg" class="target"></div>
					</div>                                        

                <div class="mypage-btn-group">
                    <a th:href="@{/user/member/mypage}"
                       class="btn btn-secondary">
                        취소
                    </a>

                    <button type="submit"
                            class="btn btn-primary">
                        변경하기
                    </button>

                </div>
            </form>
            
            <script th:inline="javascript">
const passwordUrl = /*[[@{/user/member/checkPassword}]]*/ "";
</script>

<script>
const newPassword = document.getElementById("newPassword");
const passwordCheck = document.getElementById("passwordCheck");

const passwordMsg = document.getElementById("passwordMsg");
const leakTarget = document.getElementById("passwordLeakCheck");

const strengthFill = document.getElementById("strengthFill");
const strengthText = document.getElementById("strengthText");

const form = document.querySelector(".password-change-form");

let passwordSafe = false;

// ---------------------------
// 비밀번호 일치 검사
// ---------------------------
passwordCheck.addEventListener("keyup", () => {

    if (newPassword.value === passwordCheck.value) {

        passwordMsg.textContent = "비밀번호가 일치합니다.";
        passwordMsg.className = "target text-success";

    } else {

        passwordMsg.textContent = "비밀번호가 일치하지 않습니다.";
        passwordMsg.className = "target text-danger";

    }

});

// ---------------------------
// 비밀번호 강도
// ---------------------------
newPassword.addEventListener("keyup", () => {

    const value = newPassword.value;

    let score = 0;

    if (value.length >= 8) score++;
    if (/[A-Z]/.test(value)) score++;
    if (/[a-z]/.test(value)) score++;
    if (/[0-9]/.test(value)) score++;
    if (/[!@#$%^&*()_\-+=<>?/]/.test(value)) score++;

    strengthFill.style.width = (score * 20) + "%";

    switch (score) {

        case 0:
        case 1:
            strengthFill.style.background = "#dc3545";
            strengthText.textContent = "매우 약함";
            break;

        case 2:
            strengthFill.style.background = "#fd7e14";
            strengthText.textContent = "약함";
            break;

        case 3:
            strengthFill.style.background = "#ffc107";
            strengthText.textContent = "보통";
            break;

        case 4:
            strengthFill.style.background = "#20c997";
            strengthText.textContent = "강함";
            break;

        case 5:
            strengthFill.style.background = "#198754";
            strengthText.textContent = "매우 강함";
            break;
    }

});

// ---------------------------
// 비밀번호 유출 검사
// ---------------------------
let timer;

newPassword.addEventListener("keyup", () => {

    clearTimeout(timer);

    passwordSafe = false;

    if (newPassword.value.length < 8) {

        leakTarget.textContent = "비밀번호는 8자 이상 입력해주세요.";
        leakTarget.className = "target text-warning";
        return;

    }

    timer = setTimeout(() => {

        fetch(passwordUrl + "?password=" + encodeURIComponent(newPassword.value))

            .then(res => res.json())

            .then(data => {

                if (data.error) {

                    leakTarget.textContent = "보안 검사를 수행할 수 없습니다.";
                    leakTarget.className = "target text-warning";
                    return;

                }

                if (data.safe) {

                    passwordSafe = true;

                    leakTarget.textContent = "안전한 비밀번호입니다.";
                    leakTarget.className = "target text-success";

                } else {

                    passwordSafe = false;

                    leakTarget.innerHTML =
                        "이 비밀번호는 <strong>" +
                        data.count.toLocaleString() +
                        "</strong>건의 유출 이력이 있습니다.<br>다른 비밀번호를 사용해주세요.";

                    leakTarget.className = "target text-danger";
                }

            })

            .catch(() => {

                leakTarget.textContent = "서버와 통신할 수 없습니다.";
                leakTarget.className = "target text-warning";

            });

    }, 500);

});

// ---------------------------
// 제출
// ---------------------------
form.addEventListener("submit", function(e){

    if(newPassword.value !== passwordCheck.value){

        alert("비밀번호가 일치하지 않습니다.");

        e.preventDefault();

        return;
    }

    if(!passwordSafe){

        alert("유출된 비밀번호는 사용할 수 없습니다.");

        e.preventDefault();

    }

});
</script>
        </div>
    </div>
</div>


</body>
</html>
