<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>아이디 찾기</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/memberStyle.css}">
</head>
<body>

<div th:replace="~{user/fragments/mainHeader :: mainHeader}"></div>

	<div class="auth-box">
	
	    <h2>아이디 찾기</h2>
	
	    <p class="hint" style="text-align:center; margin-bottom:25px;">
	        가입 시 등록한 이메일과 휴대폰 번호를 입력해주세요.
	    </p>
	
	    <form id="findIdForm"
	          th:action="@{/user/member/findId}"
	          method="post">
	
	        <!-- CSRF -->
	        <input type="hidden"
	               th:name="${_csrf.parameterName}"
	               th:value="${_csrf.token}">
	
	        <!-- 이메일 -->
	        <div class="form-group">
	            <input type="email"
	                   id="email"
	                   name="email"
	                   placeholder="이메일"
	                   required>
	        </div>
	
	        <!-- 휴대폰 -->
	        <div class="form-group">
	            <input type="tel"
	                   id="mobile"
	                   name="mobile"
	                   placeholder="휴대폰 번호"
	                   required>
	
	            <div class="hint">
	                '-' 없이 숫자만 입력해주세요.
	            </div>
	        </div>
	
	        <button type="submit"
	                class="btn btn-primary">
	            아이디 찾기
	        </button>
	
	    </form>	
	    <div class="form-options"
	         style="justify-content:center; margin-top:20px;">
	
	        <a th:href="@{/user/member/login}">
	            로그인
	        </a>
	
	        <span>|</span>
	
	        <a th:href="@{/user/member/findPassword}">
	            비밀번호 찾기
	        </a>
	
	        <span>|</span>
	
	        <a th:href="@{/user/member/join}">
	            회원가입
	        </a>	
	    </div>
	</div>

	<div th:replace="~{user/fragments/footer :: footer}"></div>

	<script th:inline="javascript">
	
		const form = document.getElementById("findIdForm");
		
		form.addEventListener("submit", function(e){
		
		    const email = document.getElementById("email").value.trim();
		    const mobile = document.getElementById("mobile").value.trim();
		
		    if(email === ""){
		        alert("이메일을 입력해주세요.");
		        e.preventDefault();
		        return;
		    }
		
		    if(mobile === ""){
		        alert("휴대폰 번호를 입력해주세요.");
		        e.preventDefault();
		        return;
		    }
		
		    if(!/^[0-9]+$/.test(mobile)){
		        alert("휴대폰 번호는 숫자만 입력해주세요.");
		        e.preventDefault();
		    }
		
		});
	
	</script>

</body>
</html>
