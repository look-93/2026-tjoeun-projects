<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>추가 정보 입력</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/memberStyle.css}">
</head>

<body>
<div th:replace="~{user/fragments/mainHeader :: mainHeader}"></div>
	<div class="auth-box">	
	    <h2>추가 정보 입력</h2>	
	    <div class="notice">	
	        소셜 로그인이 완료되었습니다.<br>
	        서비스 이용을 위해 추가 정보를 입력해주세요.	
	    </div>	
	    <form th:action="@{/user/member/socialInfo}" method="post">
	
	        <!-- CSRF -->
	        <input type="hidden"
	               th:name="${_csrf.parameterName}"
	               th:value="${_csrf.token}">
	        <!-- 소셜 정보 표시  -->
        <div class="form-group">
            <label class="form-title">
                이메일
            </label>
            <input type="email"
            	   name="email"
                   th:value="${socialUser.email}"
                   readonly>
        </div>

        <div class="form-group">
            <label class="form-title">
                닉네임
            </label>

            <input type="text"
            	   name="nickname"
                   th:value="${socialUser.nickname}"
                   readonly>
        </div>

        <!-- 휴대폰 -->
        <div class="form-group">
            <input type="tel"
                   id="mobile"
                   name="mobile"
                   pattern="[0-9]{11}"
				   maxlength="11"
                   placeholder="전화번호"
                   required>
            <div class="hint">
                '-' 없이 숫자만 입력해주세요.
            </div>
        </div>
        
        <!-- 성별  -->
        <div class="form-group">
            <label class="form-title">
                성별
            </label>

            <div class="gender-select">
                <input type="radio"
                       id="male"
                       name="gender"
                       value="M"
                       checked>
                <label for="male"
                       class="gender-card">
                    <span class="gender-text">
                        남성
                    </span>
                </label>

                <input type="radio"
                       id="female"
                       name="gender"
                       value="F">
                <label for="female"
                       class="gender-card">
                    <span class="gender-text">
                        여성
                    </span>
                </label>
                
                <input type="radio"
                       id="none"
                       name="gender"
                       value="N">
                <label for="none"
                       class="gender-card">
                    <span class="gender-text">
                        비공개
                    </span>
                </label>
                
            </div>
        </div>

        <!--  생년월일  -->
        <div class="form-group">
            <input type="text"
                   id="birth"
                   name="birth"
                   maxlength="6"
                   placeholder="생년월일"
                   required>

            <div class="hint">
                생년월일 6자리(YYMMDD)를 입력해주세요.
            </div>
        </div>

        <button type="submit"
                class="btn btn-primary">
            가입 완료
        </button>

    </form>
</div>
<div th:replace="~{user/fragments/footer :: footer}"></div>
</body>
</html>
