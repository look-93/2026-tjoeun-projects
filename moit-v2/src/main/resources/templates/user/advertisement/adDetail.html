<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/layouts/layout}">

<head>
    <title>광고 상세</title>
</head>


<section layout:fragment="content">

<div class="member-ad-detail-container">
	<input type="hidden" id="csrfToken" th:value="${_csrf.token}">

    <h1 class="member-ad-detail-title">
        내 광고 상세
    </h1>


    <div class="member-ad-detail-card">


        <!-- =================
             통계
        ================= -->

        <div class="member-ad-stat-wrap">


            <div class="member-ad-stat-card">

                <div class="member-ad-label">
                    노출수
                </div>

                <div class="member-ad-stat-number"
                     th:text="${dto.impressions}">
                    0
                </div>

            </div>

            <div class="member-ad-stat-card">

                <div class="member-ad-label">
                    클릭수
                </div>

                <div class="member-ad-stat-number"
                     th:text="${dto.clicks}">
                    0
                </div>

            </div>

            <div class="member-ad-stat-card">

                <div class="member-ad-label">
                    CTR
                </div>

                <div class="member-ad-stat-number">

                    <span th:if="${dto.impressions > 0}"
                          th:text="${#numbers.formatDecimal(dto.clicks * 100.0 / dto.impressions,1,2)} + '%'">
                    </span>

                    <span th:unless="${dto.impressions > 0}">
                        0.00%
                    </span>

                </div>

            </div>

        </div>

        <!-- =================
             이미지
        ================= -->

        <div class="member-ad-image-area"
             th:if="${dto.imageList != null and !#lists.isEmpty(dto.imageList)}">

            <div class="member-ad-image-box"
                 th:each="img:${dto.imageList}">
                 
                 <!-- 위치 표시 -->
		        <div class="member-ad-image-type"
				     th:text="${
				        img.imageType == 'MAIN' ? '메인' :
				        img.imageType == 'SIDEBAR' ? '사이드바' :
				        img.imageType == 'DETAIL' ? '상세' :
				        img.imageType
				     }">
				</div>

                <img th:src="${img.imageUrl}"
                     class="member-ad-image">

            </div>

        </div>

        <div class="member-ad-no-image"
             th:unless="${dto.imageList != null and !#lists.isEmpty(dto.imageList)}">

            <img src="/upload/no-image.png">

        </div>


        <!-- =================
             광고 정보
        ================= -->


        <div class="member-ad-info-wrap">


            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    광고명
                </div>

                <div class="member-ad-value"
                     th:text="${dto.title}">
                </div>

            </div>




            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    상태
                </div>

                <div class="member-ad-value"
                     th:text="${dto.status}">
                </div>

            </div>




            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    디바이스
                </div>

                <div class="member-ad-value"
                     th:text="${dto.deviceType}">
                </div>

            </div>





            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    광고채널
                </div>

                <div class="member-ad-value"
                     th:text="${dto.adChannel}">
                </div>

            </div>





            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    시작일
                </div>

                <div class="member-ad-value"
                     th:text="${#temporals.format(dto.startDatetime,'yyyy-MM-dd HH:mm:ss')}">
                </div>

            </div>





            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    종료일
                </div>

                <div class="member-ad-value"
                     th:text="${#temporals.format(dto.endDatetime,'yyyy-MM-dd HH:mm:ss')}">
                </div>

            </div>





            <div class="member-ad-info-box">

                <div class="member-ad-label">
                    예산
                </div>

                <div class="member-ad-value"
                     th:text="${dto.totalBudget}">
                </div>

            </div>

			<div class="member-ad-info-box">
			
			    <div class="member-ad-label">
			        수정일
			    </div>
			
			    <div class="member-ad-value"
				     th:if="${dto.updatedAt != null}"
				     th:text="${#temporals.format(dto.updatedAt,'yyyy-MM-dd HH:mm:ss')}">
				</div>
				
				<div class="member-ad-value"
				     th:unless="${dto.updatedAt != null}">
				    -
				</div>
			
			</div>
			
			<div class="member-ad-info-box">

			    <div class="member-ad-label">
			        광고 등급
			    </div>
			
			    <div class="member-ad-value"
			         th:text="${dto.adGrade == 'PREMIUM' ? '프리미엄' : '일반'}">
			    </div>
			
			</div>


        </div>




        <hr class="member-ad-divider">
 <!-- 내용 -->
        <div class="member-ad-content">

            <h5>
                광고 내용
            </h5>

            <p th:utext="${#strings.replace(dto.content,'.','.<br>')}"></p>

        </div>

        <hr class="member-ad-divider">
        <!-- 링크 -->

        <div class="member-ad-link">
            <h5>
                외부 링크
            </h5>
            <a th:href="${dto.landingUrl}"
               target="_blank"
               th:text="${dto.landingUrl}">
            </a>
        </div>

        <!-- 버튼 -->

        <div class="member-ad-btn-area">

            <a th:href="@{/user/advertisement/list}"
               class="member-ad-btn member-ad-btn-gray">
                목록
            </a>

            <a th:href="@{/user/advertisement/edit(adId=${dto.adId})}"
               class="member-ad-btn member-ad-btn-blue">
                수정
            </a>
            
            <button class="ad-extension-wait"
				th:if="${dto.extensionStatus == 'WAITING'}">연장 승인 대기</button> 
			<a
			th:if="${(dto.reminder30dSent == 'Y' or dto.reminder14dSent == 'Y') and dto.extensionStatus == 'NONE'}"
			href="#" class="ad-extension-btn"
			th:attr="data-id=${dto.adId}, data-end=${dto.endDatetime}"> 연장 신청 </a>

            <form th:action="@{/user/advertisement/delete}"
                  method="post">


                <input type="hidden"
                       name="adId"
                       th:value="${dto.adId}">


                <button class="member-ad-btn member-ad-btn-red"
                        onclick="return confirm('정말 삭제하시겠습니까?');">
                    삭제
                </button>
            </form>
        </div>
    </div>
</div>

<!-- 광고 연장 신청 모달 -->
	<div id="extensionModal" class="extension-modal">
		<div class="extension-box">
			<div class="extension-header">

				<h3>광고 기간 연장 신청</h3>

				<button type="button" class="extension-close">×</button>
			</div>

			<div class="extension-body">
				<input type="hidden" id="extensionAdId">

				<div class="extension-current">
					현재 종료일 <strong id="currentEndDate"> </strong>
				</div>

				<label for="extensionEndDatetime"> 변경 종료일 </label> <input
					type="datetime-local" id="extensionEndDatetime"
					class="extension-input">

				<p class="extension-guide">기존 종료일 이후 날짜만 선택 가능합니다.</p>

			</div>

			<div class="extension-actions">
				<button type="button" class="extension-submit">신청</button>

				<button type="button" class="extension-cancel">취소</button>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
		console.log("광고 JS 실행됨");
		document.addEventListener("DOMContentLoaded", () => {
		
		    const modal = document.querySelector("#extensionModal");
		
		    // 모달 열기 함수
		    function openModal() {
		        if (!modal) return;
		        modal.classList.add("is-open");
		        modal.style.display = "flex"; // 기존 CSS 대비 이중 안전장치
		    }
		
		    // 모달 닫기 함수
		    function closeModal() {
		        if (!modal) return;
		        modal.classList.remove("is-open");
		        modal.style.display = "none";
		    }
		
		    // 1. 연장 신청 버튼 클릭
		    document.addEventListener("click", (e) => {
		        const btn = e.target.closest(".ad-extension-btn");
		        if (!btn) return;
		
		        // ⚡ 핵심 수정: href="#" 로 인한 페이지 스크롤 점프(기본 동작)를 막는다.
		        // 이게 없으면 모달 자체는 열리지만 브라우저가 페이지 상단으로 이동하면서
		        // 모달이 화면에 제대로 안 보이거나, 버튼이 안 눌리는 것처럼 느껴짐.
		        e.preventDefault();
		
		        console.log("연장 신청 버튼 클릭 감지", btn);
		
		        // 데이터 가져오기
		        const adId = btn.getAttribute("data-id") || "";
		        let endDate = btn.getAttribute("data-end") || "";
		
		        // 모달 먼저 연다
		        openModal();
		
		        // 값 채워넣기
		        const adIdInput = document.querySelector("#extensionAdId");
		        const currentEndDateEl = document.querySelector("#currentEndDate");
		        const endDatetimeInput = document.querySelector("#extensionEndDatetime");
		
		        if (adIdInput) adIdInput.value = adId;
		        if (currentEndDateEl) currentEndDateEl.innerText = endDate.replace("T", " ");
		
		        // datetime-local 포맷(yyyy-MM-ddTHH:mm)에 맞게 글자 수 맞춰주기
		        if (endDate && endDate.length > 16) {
		            endDate = endDate.substring(0, 16);
		        }
		        if (endDatetimeInput) {
		            endDatetimeInput.min = endDate;
		            endDatetimeInput.value = ""; // 이전에 입력했던 값 초기화
		        }
		    });
		
		    // 2. 모달 닫기 (닫기 버튼 / 취소 버튼)
		    document.querySelectorAll(".extension-close, .extension-cancel").forEach(btn => {
		        btn.addEventListener("click", closeModal);
		    });
		
		    // 3. 모달 바깥(어두운 배경) 클릭 시 닫기
		    if (modal) {
		        modal.addEventListener("click", (e) => {
		            if (e.target === modal) {
		                closeModal();
		            }
		        });
		    }
		
		    // 4. ESC 키로 닫기
		    document.addEventListener("keydown", (e) => {
		        if (e.key === "Escape") {
		            closeModal();
		        }
		    });
		
		    // 5. 폼 제출
		    const submitBtn = document.querySelector(".extension-submit");
		    if (submitBtn) {
		        submitBtn.addEventListener("click", () => {
		            const endInput = document.querySelector("#extensionEndDatetime");
		            const end = endInput ? endInput.value : "";
		            const min = endInput ? endInput.min : "";
		
		            if (!end) {
		                alert("연장 종료일을 선택해주세요.");
		                return;
		            }
		
		            if (end <= min) {
		                alert("현재 종료일 이후 날짜만 선택 가능합니다.");
		                return;
		            }
		
		            const data = {
		                adId: document.querySelector("#extensionAdId").value,
		                extensionRequestEndDatetime: end
		            };
		
		            const csrfEl = document.querySelector("#csrfToken");
		            const csrfToken = csrfEl ? csrfEl.value : "";
		
		            fetch("/user/advertisement/extensionRequest", {
		                method: "POST",
		                headers: {
		                    "Content-Type": "application/json",
		                    "X-CSRF-TOKEN": csrfToken
		                },
		                body: JSON.stringify(data)
		            })
		            .then(res => {
		                if (!res.ok) {
		                    throw new Error("연장 신청 실패");
		                }
		                alert("연장 신청이 완료되었습니다.");
		                location.reload();
		            })
		            .catch(err => {
		                alert(err.message);
		            });
		        });
		    }
		});
	</script>
</section>

</html>
