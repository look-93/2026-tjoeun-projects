<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/layouts/layout}">
<head lang="ko">
<meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content">
		<section class="main-hero">

			<div>

				<h1>
					당신의 관심사가<br> 새로운 모임이 되는 곳
				</h1>

				<p>대학생 · 일반인을 위한 모임 플랫폼</p>

				<div class="main-hero-btn">
					<button class="main-btn main-btn-primary" onclick="goMeetupList()">모임 찾기</button>
					<button class="main-btn main-btn-light">행사 보기</button>
				</div>

			</div>

			<div class="main-hero-image">👥</div>

		</section>

		<section class="main-category">	
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId=1'">
		        🏃<span>운동</span>
		    </div>
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId=2'">
		        📚<span>스터디</span>
		    </div>
		     <div class="main-category-card" onclick="location.href='/meetup/list?categoryId=3'">
		        🎮<span>취미</span>
		    </div>
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId=4'">
		        🎨<span>문화</span>
		    </div>
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId=5'">
		        ☕<span>맛집</span>
		    </div>	    
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId='">
		        ✈️<span>여행</span>
		    </div>
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId='">
		        ☕<span>카페</span>
		    </div>
		    <div class="main-category-card" onclick="location.href='/meetup/list?categoryId='">
		        🎵<span>음악</span>
		    </div>	
		</section>
	
		<!-- 광고 영역 -->
		<section class="ad-banner"
		         th:if="${mainAd != null}"
		         th:classappend="${mainAd.imageList != null and !mainAd.imageList.isEmpty()} ? ' has-image' : ''">
	
			<a th:href="@{/user/advertisement/click(adId=${mainAd.adId}, position='MAIN')}">
	
				<!-- 광고 이미지 존재 -->
				<img th:if="${mainAd.imageList != null 
                    		and !mainAd.imageList.isEmpty()}"
		             th:src="@{${mainAd.imageList[0].imageUrl}}"
		             alt="광고">
		
		        <div th:if="${mainAd.imageList == null 
		                     or mainAd.imageList.size() == 0}">
		            광고 이미지 준비중
		        </div>	      
	
			</a>
			
	        <!-- PREMIUM 광고 제목 -->
	        <div th:if="${mainAd.adGrade == 'PREMIUM'}"
	             class="premium-ad-overlay">
	
	
	            <span th:text="${mainAd.title}">
	                광고 제목
	            </span>
	
	
	            <!-- hover 내용 -->
	            <div class="premium-ad-tooltip">
	
	                <p th:utext="${#strings.replace(mainAd.content,'.','.<br>')}"></p>
	
	            </div>
	
	        </div>
	
		</section>
		
		<section class="section">
		    <h2 class="section-title">🔥 인기 모임</h2>
		
		    <div class="slider">
		        <div class="slide-track">
		
		            <!-- 첫 번째 -->
		            <div class="card"
					     th:each="meetup : ${popularMeetupList}"
					     th:onclick="|gotoDetailOrLogin('@{${meetup.meetupId}}')|">
		            	<div class="card-img">
							<img th:if="${meetup.imagePath != null}"  th:src="@{/upload/meetup/{file}(file=${meetup.imagePath})}"  alt="${meetup.title}" />
							<div th:unless="${meetup.imagePath != null}" class="meetup-no-image">
							     <span class="icon">🖼️</span>
       							 <span>등록된 이미지가 없습니다.</span>
							</div>
						</div>
			            <div class="card-body">
							<h4 th:test="${meetup.title}"></h4>
							<div class="card-info">정원 
								<span th:text="${meetup.totalParticipants}">0</span> /
	                        	<span th:text="${meetup.maxParticipants}">0</span>
		                        ·
		                        <span th:text="${meetup.sidoName}">서울</span>	                        	
	                        </div>
						</div>					
		            </div>
		        </div>
		    </div>
		</section>

	<script type="text/javascript">
		function goMeetupList(){
			location.href="/meetup/list"
		}
	
	</script>
	</div>
</body>
</html>
