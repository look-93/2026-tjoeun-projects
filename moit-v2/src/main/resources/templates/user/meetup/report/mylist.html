<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{user/mypage/layouts/mypageLayout}">
<!--    #1. layout 렌더링    -->
<head lang="ko">
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div layout:fragment="content">
				<!-- 페이지 내용 -->

<div class="mylist-page"> 

	<section class="mylist-card">
		<div class="mylist-card-head">
			<div class="mylist-card-title">
				내 신고내역
			</div>
		</div>

		<div class="mylist-table-wrap">
			<table class="mylist-table">
				<thead>
					<tr>
						<th>신고번호</th>
						<th>대상</th>
						<th>대상 글 번호 ID</th>
						<th>신고사유</th>
						<th>상태</th>
						<th>신고일</th>
						<th>관리</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="dto, status: ${list}">
						<td th:text="${status.count}"></td>
						<td th:text="${dto.targetType}"></td>
						<td th:text="${dto.targetId}"></td>
						<td th:text="${dto.reasonCode}"></td>
						<td>
							<span th:if="${dto.status == 'PENDING'}" th:text="${dto.status}"
								class="mylist-status pending"></span>
							<span th:if="${dto.status == 'APPROVED'}" th:text="${dto.status}"
								class="mylist-status approved"></span>
							<span th:if="${dto.status == 'REJECTED'}" th:text="${dto.status}"
								class="mylist-status rejected"></span>
						</td>
						<td th:text="${dto.createdAt}"></td>
						<td>
							<a class="mylist-link" th:href="@{/user/meetup/report/detail(reportId=${dto.reportId})}">
								상세
							</a>
						</td>
					</tr>
				</tbody>

				<tfoot>
					<tr>
						<td colspan="7">
							<ul class="mylist-pagination">
								<!-- 이전 -->
								<th:block th:if="${paging.start > paging.bottomlist}">
									<li>
										<a th:href="@{/user/meetup/report/mylist(pstartno=${paging.start - 1})}" class="mylist-page-btn"><</a>
									</li>
								</th:block>

								<!-- 페이지 번호 -->
								<th:block th:each=" i : ${#numbers.sequence(paging.start, paging.end)}">
									<li>
										<a th:href="@{/user/meetup/report/mylist(pstartno=${i})}" class="mylist-page-btn"
											th:classappend="${i == paging.current} ? 'active' : ''"
											th:text="${i}">
										</a>
									</li>
								</th:block>

								<!-- 다음 -->
								<th:block th:if="${paging.end < paging.pagetotal}">
									<li>
										<a th:href="@{/user/meetup/report/mylist(pstartno=${paging.end + 1})}" class="mylist-page-btn">></a>
									</li>
								</th:block>
							</ul>
						</td>
					</tr>
				</tfoot>
				
			</table>
		</div>
	</section>

</div>

			</div>
	</div>
	<th:block th:replace="~{user/fragments/footer :: footer}" />
</body>
</html>
