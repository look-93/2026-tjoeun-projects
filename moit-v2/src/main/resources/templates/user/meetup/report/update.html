<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <title>MOIT | 모집글 목록</title> -->
<title>MOIT</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<th:block th:replace="~{user/fragments/mainHeader :: mainHeader}" />
	<div class="container">
			<div layout:fragment="content">
				<!-- 페이지 내용 -->

<div class="update-page">

	<section class="update-card">
		<div class="update-card-head">
			<div class="update-card-title">
				신고 수정
			</div>
		</div>

		<div class="update-inner">
			<form th:action="@{/user/meetup/report/update}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<input type="hidden" name="reportId" th:value="${dto.reportId}">
				<input type="hidden" name="targetType" th:value="${dto.targetType}">
				<input type="hidden" name="targetId" th:value="${dto.targetId}">
				<input type="hidden" name="memberId" th:value="${dto.memberId}">

				<label class="update-form-label">
					신고 사유 <span class="update-required">(필수)</span>
				</label>

				<div class="update-reason-grid">
					<label class="update-reason-item">
						<input type="radio" name="reasonCode" value="ABUSE" th:checked="${dto.reasonCode == 'ABUSE'}">
						욕설/비방 (ABUSE)
					</label>

					<label class="update-reason-item">
						<input type="radio" name="reasonCode" value="SPAM" th:checked="${dto.reasonCode == 'SPAM'}">
						도배/스팸 (SPAM)
					</label>

					<label class="update-reason-item">
						<input type="radio" name="reasonCode" value="FAKE_INFO" th:checked="${dto.reasonCode == 'FAKE_INFO'}">
						허위 정보 (FAKE_INFO)
					</label>

					<label class="update-reason-item">
						<input type="radio" name="reasonCode" value="AD" th:checked="${dto.reasonCode == 'AD'}">
						광고성 게시물 (AD)
					</label>

					<label class="update-reason-item">
						<input type="radio" name="reasonCode" value="NOSHOW" th:checked="${dto.reasonCode == 'NOSHOW'}">
						노쇼 (NOSHOW)
					</label>

					<label class="update-reason-item">
						<input type="radio" name="reasonCode" value="ETC" th:checked="${dto.reasonCode == 'ETC'}">
						기타 (ETC)
					</label>
				</div>

				<label class="update-form-label">상세 내용
					<span class="update-optional">(선택)</span>
				</label>

				<textarea class="update-textarea"
						  id="reasonDetail"
						  name="reasonDetail"
						  maxlength="200"
						  placeholder="신고 내용을 자세히 입력해주세요."
						  th:text="${dto.reasonDetail}"></textarea>

				<div class="update-counter">
					<span id="detailCount">0</span> / 200
				</div>

				<div class="update-actions">
					<button type="button" class="update-btn update-btn-white" onclick="history.back()">취소</button>
					<button type="submit" class="update-btn update-btn-blue">수정 완료</button>
				</div>
			</form>
		</div>
	</section>

</div>

<script>
	const reasonDetail = document.getElementById('reasonDetail');
	const detailCount = document.getElementById('detailCount');

	function updateDetailCount() {
		detailCount.textContent = reasonDetail.value.length;
	}

	updateDetailCount();

	reasonDetail.addEventListener('input', updateDetailCount);
</script>

			</div>
	</div>
	<th:block th:replace="~{user/fragments/footer :: footer}" />
</body>
</html>
