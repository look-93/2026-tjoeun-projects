<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
		xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
		layout:decorate="~{user/layouts/layout}">
		
<head lang="ko">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <title>MOIT | 모집글 목록</title> -->
<title>MOIT</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
         <div layout:fragment="content">
            <!-- 페이지 내용 -->

<div class="detail-page">

   <section class="detail-card">
      <div class="detail-card-head">
         <div class="detail-card-title">
            상세보기
         </div>
      </div>

      <div class="detail-inner">
         <div class="detail-grid">
            <div class="detail-row">
               <div class="detail-label">신고번호</div>
               <div class="detail-value" th:text="|${dto.reportId}번 REPORT|"></div>
            </div>

            <div class="detail-row">
               <div class="detail-label">신고 대상 ID (닉네임)</div>
               <div class="detail-value" th:text="|${dto.targetMemberId} ( ${dto.targetNickname} )|"></div>
            </div>
            <div class="detail-row">
               <div class="detail-label">신뢰도 점수 (뱃지)</div>
               <div class="detail-value" th:text="|${dto.trustScore} ( ${dto.statusName} )|"></div>
            </div>

            <div class="detail-row">
               <div class="detail-label">신고 대상</div>
               <div class="detail-value" th:text="|${dto.targetType} ${dto.targetId}번 글|"></div>
            </div>

            <div class="detail-row">
               <div class="detail-label">신고 사유</div>
               <div class="detail-value" th:text="${dto.reasonCode}"></div>
            </div>

            <div class="detail-row">
               <div class="detail-label">상세 내용</div>
               <div class="detail-value" th:text="${dto.reasonDetail}"></div>
            </div>

            <div class="detail-row">
               <div class="detail-label">처리 상태</div>
               <div class="detail-value">
                  <span th:if="${dto.status == 'PENDING'}" th:text="${dto.status}"
                     class="detail-status pending">
                  </span>
                  <span th:if="${dto.status == 'APPROVED'}" th:text="${dto.status}"
                     class="detail-status approved">
                  </span>
                  <span th:if="${dto.status == 'REJECTED'}" th:text="${dto.status}"
                     class="detail-status rejected">
                  </span>
               </div>
            </div>

            <div class="detail-row">
               <div class="detail-label">신고일</div>
               <div class="detail-value" th:text="${dto.createdAt}"></div>
            </div>
            
            <div th:if="${dto.updatedAt != null}"
               class="detail-row">
               <div class="detail-label">수정일자</div>
               <div class="detail-value" th:text="${dto.updatedAt}"></div>
            </div>
         </div>
      </div>

		<div class="detail-actions">
			<a th:href="@{/user/meetup/report/mylist}" class="detail-btn detail-btn-white">목록</a>
			
			<a th:if="${dto.targetType == 'MEETUP'}"
				th:href="@{/meetup/detail(meetupId=${dto.targetId})}" class="detail-btn detail-btn-soft-blue">
				해당 글 보기
			</a>
			<a th:if="${dto.targetType == 'REVIEW'}"
				th:href="@{/meetup/detail(meetupId=${dto.targetId})}" class="detail-btn detail-btn-soft-blue">
				해당 글 보기
			</a>
			
			<a th:if="${dto.status == 'PENDING'}"
				th:href="@{/user/meetup/report/update(reportId=${dto.reportId})}" class="detail-btn detail-btn-blue">수정</a>
			
			<!-- modal delete 
			<button type="button"
					class="detail-btn detail-btn-red"
					data-bs-toggle="modal"
					data-bs-target="#deleteModal">삭제
			</button> -->
			
			<!-- confirm delete -->
			<form th:if="${dto.status == 'PENDING'}"
				th:action="@{/user/meetup/report/delete}" method="post"
				onsubmit="return confirm('삭제하시겠습니까?');">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<input type="hidden" name="reportId" th:value="${dto.reportId}" />
				
				<button type="submit" class="detail-btn detail-btn-red">삭제</button> 
			</form> 
		</div>
	</section>

   <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
         <div class="modal-content detail-delete-modal-box">

            <div class="modal-body detail-delete-modal-body">
               <h2 class="detail-delete-modal-title">삭제하시겠습니까?</h2>

               <form th:action="@{/user/meetup/report/delete}" method="post">

                  <div class="detail-delete-modal-actions">
                     <button type="button" class="detail-btn detail-btn-white" data-bs-dismiss="modal">취소</button>
                     <button type="submit" class="detail-btn detail-btn-red-fill">삭제</button>
                  </div>
               </form>
               
            </div>
         </div>
      </div>
   </div> -->
   
   

</div>

         </div>
</body>
</html>
