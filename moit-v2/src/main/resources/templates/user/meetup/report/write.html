<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
   xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{user/layouts/layout}">
<!--    #1. layout 렌더링    -->
<head lang="ko">
<meta charset="UTF-8">
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body>
			<div layout:fragment="content">
				<!-- 페이지 내용 -->


<main class="write-page">

	<section class="write-layout">
		<form class="write-card write-form-card"
			  th:action="@{/user/meetup/report/write}"
			  method="post">

			<div class="write-card-title">
				<h2 class="write-heading">신고하기</h2>
			</div>

			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
			<input type="hidden" name="targetType" th:value="${dto.targetType}" />
			<input type="hidden" name="targetId" th:value="${dto.targetId}" />
			
			<!-- 중복신고방지 ajax -->
			<div class="doubleReport_result"></div>
			<!-- 본인아이디신고방지 ajax -->
			<div class="reportMe_result"></div>
			
			<div class="write-field">
				<label class="write-label">
					신고 사유
					<span class="write-required">(필수)</span>
				</label>

				<div class="write-reasons">
					<label class="write-reason">
						<input class="write-radio" type="radio" name="reasonCode" value="ABUSE" required />
						욕설/비방 (ABUSE)
					</label>

					<label class="write-reason">
						<input class="write-radio" type="radio" name="reasonCode" value="SPAM" />
						도배/스팸 (SPAM)
					</label>

					<label class="write-reason">
						<input class="write-radio" type="radio" name="reasonCode" value="FAKE_INFO" />
						허위 정보 (FAKE_INFO)
					</label>

					<label class="write-reason">
						<input class="write-radio" type="radio" name="reasonCode" value="AD" />
						광고성 게시물 (AD)
					</label>

					<label class="write-reason">
						<input class="write-radio" type="radio" name="reasonCode" value="NOSHOW" />
						노쇼 (NOSHOW)
					</label>

					<label class="write-reason">
						<input class="write-radio" type="radio" name="reasonCode" value="ETC" />
						기타 (ETC)
					</label>
				</div>
			</div>
			
			<div class="write-field">
				<label class="write-label" for="Keywords">AI신고 내용 작성
					<span class="write-optional">(선택)</span>
				</label>
				<textarea
					class="write-textarea"
					placeholder="키워드 예시) 욕설, 반복적인 비방, 불쾌한 표현"
					id="keywords"
					name="keywords"
					title="키워드작성"
					maxlength="150"></textarea>
				<div class="write-actions">
					<input
						type="button"
						id="sendBtn"
						class="write-btn write-btn-primary"
						value="키워드작성">
				</div>
				<div id="response" class="alert write-alert-warning"></div>
			</div>


			<div class="write-field">
				<label class="write-label" for="reasonDetail">상세 내용
					<span class="write-optional">(선택)</span>
				</label>

				<textarea class="write-textarea"
						  id="reasonDetail"
						  name="reasonDetail"
						  maxlength="200"
						  placeholder="신고 내용을 자세히 입력해주세요."></textarea>

				<div class="write-counter">
					<span id="detailCount">0</span> / 200
				</div>
			</div>
			
			<!-- 알람메시지 -->
			<div th:if="${result}" class="write-result-alert-message" role="alert">
				<span th:text="${result}"></span>
			</div>

			<div class="write-actions">
				<button type="button" class="write-btn" onclick="history.back()">취소</button>
				<button type="submit" class="write-btn write-btn-primary">신고 등록</button>
			</div>
		</form>
	</section>
</main>

<script>
	const reasonDetail = document.getElementById('reasonDetail');
	const detailCount = document.getElementById('detailCount');

	reasonDetail.addEventListener('input', function() {
		detailCount.textContent = reasonDetail.value.length;
	});
	
	
	
	window.addEventListener("load", function() {
		const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
		const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
		console.log(token);
		console.log(header);
		
		//
		const sendBtn = document.getElementById("sendBtn");
		const keywordsInput = document.getElementById("keywords");
		const response = document.getElementById("response");
		
		
		
		//
		sendBtn.addEventListener("click", function() {
			const keywords = keywordsInput.value.trim();
			
			const selectReason = document.querySelector("input[name='reasonCode']:checked");

			if (!selectReason) {
				alert("신고 사유를 먼저 선택해주세요.");
				return;
			}
			if (keywords.length === 0) {
				alert("키워드를 입력해주세요.");
				keywordsInput.focus();
				return;
			}
			const requestText = "신고 사유: " + selectReason.value
						 + "\n사용자 키워드: " + keywords;
			
			//
			fetch(`/report/api/openai`, {
					method: "POST",
					headers: {
						"Content-Type": "application/json; charset=UTF-8",
						[header]: token
					},
					body: JSON.stringify(requestText)
			})
			.then(response => {
				if (!response.ok) {
					return response.text().then(errText => {
						throw new Error(errText)
					})
				}
				return response.text();
			})
			.then(result => {
				reasonDetail.value=result;
			})
			.catch(error => {
				console.error("AI 호출 오류:", error);
				response.textContent = error.message;
			});
		});
	});
	
//	중복 신고 방지 (AJAX)
//	if select(*) 신고 이력이 있다면
//	ajax로 신고 불가능하게
//	memberId, targetType, targetId
//window.addEventListner("load", function() {
//	let memberId = document.getElementById("memberId");
//	let target = document.quertSelector(".doubleReport_result");
	
//	memberId.addEventListener("keyup", function(e) {
		
//	})
//})

</script>
</div>
</body>
</html>
