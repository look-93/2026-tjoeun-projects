<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
   layout:decorate="~{user/layouts/layout}">
<head lang="ko">
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/qnaStyle.css}">

</head>
<body>
    <div layout:fragment="content">
		<div class="inquiry-wrap-write">
		    <div class="page-card-write">
		        <h1 class="page-title-write" th:text="${category == 'MEETUP'} ? '모임 1:1 문의 등록' : '관리자 1:1 문의 등록'"></h1>
		        <div class="breadcrumb-write"> <span th:text="${category == 'MEETUP'} ? '모임글 1:1 문의' : '관리자 1:1 문의'"></span> &gt; 문의 등록 </div>

		        <div class="form-box-write">

		        <h3>문의 정보 입력</h3>
				
		        <form th:action="@{/questions/write}" method="post"
		              onsubmit="return ck()">
		
		            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

		            <input th:if="${meetupId != null}" type="hidden" name="parentId" th:value="${meetupId}">
		            <input type="hidden" name="category" th:value="${category}">
		            <input type="hidden" name="deleteYn" value="N">
		
		            <div class="form-group-write">
		                <label> 제목 <span class="required-write">*</span> </label>
		                <input type="text"
		                       name="title"
		                       id="title"
		                       th:value="${param.title}"
		                       placeholder="제목을 입력하세요">
		            </div>
		
		            <div class="form-group-write">
		                <label> 문의 내용 <span class="required-write">*</span> </label>
		                <textarea name="content" id="content" placeholder="문의 내용을 입력하세요." th:text="${param.content}"></textarea>
		            </div>
		
		            <div class="form-group-write">
		                <label class="checkbox-label-write">
		                    <input type="checkbox" id="privateChk"> 비공개 문의
		                </label>
		                <input type="hidden" name="isPublic" id="isPublic" value="Y">
		            </div>
		
		            <div class="btn-area-write">
		                <button type="submit" class="btn-write btn-primary-write"> 등록하기 </button>
		                <button type="button" class="btn-write btn-cancel-write" onclick="history.back()"> 취소 </button>
		            </div>
		
		        </form>

		        </div>
		
		    </div>
		</div>
		
		
<script>
	document.getElementById("privateChk")
	    .addEventListener("change", function(){
	    document.getElementById("isPublic").value = this.checked ? "N" : "Y";
	});
	function ck() {
	    let title = document.getElementById("title").value.trim();
	    let content = document.getElementById("content").value.trim();
	
	    if (title === "") { alert("제목을 입력해주세요."); document.getElementById("title").focus(); return false; }
	    if (content === "") { alert("문의 내용을 입력해주세요."); document.getElementById("content").focus(); return false; }
	    return confirm("문의를 등록하시겠습니까?");
	}
</script>
</div>        
</body>
</html>
