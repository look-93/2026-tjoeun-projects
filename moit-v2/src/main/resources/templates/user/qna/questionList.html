<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/mypage/layouts/mypageLayout}">
<head>
<meta charset="UTF-8">

<style>

.inquiry-wrap{
    padding:40px 0;
}

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.page-header h1{
    font-size:34px;
    margin-bottom:10px;
}

.page-header p{
    color:#64748b;
}

.write-btn{
    background:#2563ff;
    color:white;
    text-decoration:none;
    padding:14px 24px;
    border-radius:12px;
    font-weight:600;
}

.status-tab{
    display:flex;
    gap:40px;
    margin-bottom:25px;
}

.status-tab a{
    text-decoration:none;
    color:#64748b;
    padding-bottom:10px;
}

.status-tab .active{
    color:#2563ff;
    border-bottom:3px solid #2563ff;
}

.content-layout{
    display:flex;
    gap:30px;
}

.list-section{
    flex:1;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.04);
}

.search-box{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

.search-box select,
.search-box input{
    height:46px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    padding:0 15px;
}

.search-box input{
    flex:1;
}

.search-box button{
    width:90px;
    border:none;
    border-radius:10px;
    background:#2563ff;
    color:white;
    cursor:pointer;
}

.inquiry-table{
    width:100%;
    border-collapse:collapse;
}

.inquiry-table th{
    background:#f8fafc;
    padding:18px;
    text-align:center;
}

.inquiry-table td{
    padding:18px;
    text-align:center;
    border-bottom:1px solid #f1f5f9;
}

.inquiry-table tbody tr{
    cursor:pointer;
}

.inquiry-table tbody tr:hover{
    background:#f8fafc;
}

.badge{
    padding:5px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.waiting{
    color:#f97316;
    border:1px solid #f97316;
}

.complete{
    color:#22c55e;
    border:1px solid #22c55e;
}

.paging{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:25px;
}

.paging a{
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #e2e8f0;
    border-radius:10px;
    text-decoration:none;
    color:#475569;
}

.paging .active{
    background:#2563ff;
    color:white;
}

.guide-box{
    width:260px;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.04);
}

.guide-box h3{
    margin-bottom:20px;
}

.guide-item{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

.icon{
    font-size:24px;
}

.guide-item strong{
    display:block;
    margin-bottom:5px;
}

.guide-item p{
    font-size:13px;
    color:#64748b;
}

</style>

</head>
<body>
<div layout:fragment="content">

<main class="container inquiry-wrap">

    <div class="page-header">
        <div>
            <h1>내 문의 내역</h1>
            <p>내가 작성한 문의 내역을 확인할 수 있습니다.</p>
        </div>

        <a th:href="@{/questions/write(category=${category})}"
           class="write-btn">
            ✎ 문의 등록
        </a>
    </div>

    <div class="status-tab">
        <a href="#" class="active">전체</a>
    </div>

    <div class="content-layout">
        <div class="list-section">

            <form class="search-box">
                <select name="type">
                    <option value="title">제목</option>
                    <option value="content">내용</option>
                </select>

                <input type="text"
                       name="keyword"
                       placeholder="검색어를 입력하세요">

                <button type="submit">검색</button>
            </form>

            <table class="inquiry-table">

                <thead>
                    <tr>
                        <th>번호</th>
                        <th>문의구분</th>
                        <th>제목</th>
                        <th>답변상태</th>
                        <th>등록일</th>
                        <th>답변일</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:if="${#lists.isEmpty(list)}">
                        <td colspan="7">등록된 문의가 없습니다.</td>
                    </tr>

                    <tr th:each="q : ${list}"
                        th:unless="${#lists.isEmpty(list)}"
                        th:onclick="|location.href='@{/questions/{id}(id=${q.questionId})}'|">
                        <td th:text="${q.questionId}"></td>
                        <td th:text="${q.category == 'MEETUP'} ? '모임 문의' : '관리자 문의'"></td>
                        <td th:text="${q.title}"></td>
                        <td>

                            <span class="badge waiting" th:if="${q.status == 'PENDING'}">
                                답변 대기
                            </span>
                            <span class="badge complete" th:if="${q.status == 'ANSWERED'}">
                                답변 완료
                            </span>

                        </td>
                        <td th:text="${#dates.format(q.createdAt, 'yyyy.MM.dd HH:mm:ss')}"></td>
                        <td th:text="${q.status == 'ANSWERED'} ? '완료' : '-'"></td>
                        <td>›</td>

                    </tr>

                </tbody>

            </table>

            <div class="paging">

                <a th:if="${page > 1}"
                   th:href="@{/questions(page=${page-1})}">
                    ‹
                </a>

                <a th:each="i : ${#numbers.sequence(1,totalPage)}"
                   th:href="@{/questions(page=${i})}"
                   th:text="${i}"
                   th:classappend="${page == i} ? ' active'">
                </a>

                <a th:if="${page < totalPage}"
                   th:href="@{/questions(page=${page+1})}">
                    ›
                </a>

            </div>

        </div>

        <aside class="guide-box">

            <h3>이용 가이드</h3>

            <div class="guide-item">
                <div class="icon">📎</div>
                <div>
                    <strong>문의 등록</strong>
                    <p>궁금한 내용을 등록해 주세요.</p>
                </div>
            </div>

            <div class="guide-item">
                <div class="icon">💬</div>
                <div>
                    <strong>답변 확인</strong>
                    <p>작성자의 답변을 확인할 수 있습니다.</p>
                </div>
            </div>

            <div class="guide-item">
                <div class="icon">🗓</div>
                <div>
                    <strong>문의 수정/삭제</strong>
                    <p>답변 전까지 수정 및 삭제가 가능합니다.</p>
                </div>
            </div>

        </aside>

    </div>

</main>

</div>
</body>
</html>
