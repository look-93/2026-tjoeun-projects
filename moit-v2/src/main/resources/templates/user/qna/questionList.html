<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/mypage/layouts/mypageLayout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/qnaStyle.css}">

</head>
<body>
<div layout:fragment="content">

<main class="container inquiry-wrap-list">

    <div class="page-header-list">
        <div>
            <h1>내 문의 내역</h1>
            <p>내가 작성한 문의 내역을 확인할 수 있습니다.</p>
        </div>
    </div>

    <div class="content-layout-list">
        <div class="list-section-list">

            <form class="search-box-list" th:action="@{/questions/myQuestion}" method="get">
                <select name="type">
                    <option value="title" th:selected="${type == 'title'}">제목</option>
                    <option value="content" th:selected="${type == 'content'}">내용</option>
                </select>

                <input type="text" name="keyword" th:value="${keyword}" 
                	   placeholder="검색어를 입력하세요">

                <button type="submit">검색</button>
            </form>

            <table class="inquiry-table-list">

                <thead>
                    <tr>
                        <th>번호</th>
                        <th>문의구분</th>
                        <th>제목</th>
                        <th>공개여부</th>
                        <th>답변상태</th>
                        <th>등록일</th>
                        <th>답변일</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:if="${#lists.isEmpty(list)}">
                        <td colspan="7">등록된 문의가 없습니다.</td>
                    </tr>
                    <tr th:each="q, stat : ${list}"
                        th:onclick="|location.href='@{/questions/{id}(id=${q.questionId})}'|">
                        <td th:text="${totalCnt - (page - 1) * 10 - stat.index}"></td>
                        <td th:text="${q.category == 'MEETUP'} ? '모임 문의' : '관리자 문의'"></td>
                        <td th:text="${q.title}"></td>
                        <td>
						    <span class="public-badge-list" th:if="${q.isPublic == 'Y'}">🔓 공개</span>
						    <span class="private-badge-list" th:if="${q.isPublic == 'N'}">🔒 비공개</span>
						</td>
                        <td>
                            <span class="badge-list waiting-list" th:if="${q.status == 'PENDING'}"> 답변 대기 </span>
                            <span class="badge-list complete-list" th:if="${q.status == 'ANSWERED'}"> 답변 완료 </span>
                        </td>
                        <td th:text="${#dates.format(q.createdAt, 'yyyy.MM.dd HH:mm:ss')}"></td>
                        <td th:text="${q.answer != null ? #dates.format(q.answer.createdAt,'yyyy.MM.dd HH:mm:ss') : '-'}"></td>	
                    </tr>

                </tbody>

            </table>

            <div class="paging-list" th:if="${totalPage > 0}">

                <a th:if="${startPage > 1}"
                   th:href="@{/questions/myQuestion(
							page=${startPage-1},
				            type=${type},
				            keyword=${keyword})}">
                    이전
                </a>

                <a th:each="i : ${#numbers.sequence(startPage, endPage)}"
                   th:href="@{/questions/myQuestion(
				            page=${i},
				            type=${type},
				            keyword=${keyword})}"
                   th:text="${i}"
                   th:classappend="${page == i} ? ' active-list'">
                </a>

                <a th:if="${endPage < totalPage}"
                   th:href="@{/questions/myQuestion(page=${endPage+1},
				            type=${type},
				            keyword=${keyword})}">
                    다음
                </a>

            </div>

        </div>

        <aside class="guide-box-list">

            <h3>이용 가이드</h3>

            <div class="guide-item-list">
                <div class="icon-list">📎</div>
                <div>
                    <strong>문의 등록</strong>
                    <p>궁금한 내용을 등록해 주세요.</p>
                </div>
            </div>

            <div class="guide-item-list">
                <div class="icon-list">💬</div>
                <div>
                    <strong>답변 확인</strong>
                    <p>작성자의 답변을 확인할 수 있습니다.</p>
                </div>
            </div>

            <div class="guide-item-list">
                <div class="icon-list">🗓</div>
                <div>
                    <strong>문의 수정/삭제</strong>
                    <p>답변 전까지 수정 및 삭제가 가능합니다.</p>
                </div>
            </div>

        </aside>

    </div>

</main>

</div>
</body>
</html>
