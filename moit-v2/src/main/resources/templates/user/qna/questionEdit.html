<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/layouts/layout}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/qnaStyle.css}">

</head>
<body>
<div layout:fragment="content">

<div class="inquiry-wrap-edit">
    <h1 class="page-title-edit" th:text="${data.category == 'MEETUP'} ? '모임 1:1 문의 수정' : '관리자 1:1 문의 수정'"> </h1>
    <div class="breadcrumb-edit"> <span th:text="${data.category == 'MEETUP'} ? '모임 1:1 문의' : '관리자 1:1 문의'"></span> &gt; 문의 수정 </div>
    <div class="page-desc-edit">작성한 문의 내용을 수정 후 저장해 주세요.</div>

	    <form th:action="@{/questions/edit}" method="post" onsubmit="return confirm('저장하시겠습니까?');">
	        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
	        <!-- 수정할 게시글 PK -->
	        <input type="hidden" name="questionId" th:value="${data.questionId}">

	        <div class="form-card-edit">
	
	            <div class="form-group-edit">
	                <label class="form-label-edit"> 제목 <span class="required-edit">*</span> </label>
	                <input type="text" name="title" class="form-input-edit" th:value="${data.title}">
	            </div>
	            
	            <div class="form-group-edit">
	                <label class="form-label-edit">문의 공개 여부</label>
	                <div class="radio-group-edit">
	                    <label class="radio-item-edit">
	                        <input type="radio" name="isPublic" value="Y"
	                               th:checked="${data.isPublic == 'Y'}"> 공개
	                    </label>
	
	                    <label class="radio-item-edit">
	                        <input type="radio" name="isPublic" value="N"
	                               th:checked="${data.isPublic == 'N'}"> 비공개
	                    </label>
	                </div>
	                <div class="guide-text-edit"> 비공개로 설정 시, 관리자만 확인할 수 있습니다. </div>
	            </div>
	
	            <div class="form-group-edit">
	                <label class="form-label-edit"> 문의 내용 <span class="required-edit">*</span> </label>
	                <textarea name="content" class="form-textarea-edit" th:text="${data.content}"></textarea>
	            </div>
	
	            <div class="btn-area-edit">
	                <button type="submit" class="btn-edit btn-save-edit"> 저장 </button>
	                <button type="button" class="btn-edit btn-cancel-edit" onclick="history.back()"> 취소
	                </button>
	            </div>
	        </div>
	    </form>
</div>

</div>
</body>
</html>
