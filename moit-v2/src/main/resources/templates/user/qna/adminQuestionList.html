<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{user/mypage/layouts/mypageLayout}">
<head>
<meta charset="UTF-8">
<title>관리자 1:1 문의</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.page-header h1{
    font-size:34px;
    margin-bottom:10px;
    color:#1e293b;
}

.page-header p{
    color:#64748b;
    line-height:1.6;
}

.summary-wrap{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.summary-card{
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:18px;
    padding:24px;
    box-shadow:0 8px 20px rgba(15,23,42,.05);
}

.summary-card h4{
    font-size:15px;
    color:#64748b;
    margin-bottom:10px;
    font-weight:600;
}

.summary-card strong{
    font-size:34px;
    color:#2563eb;
    font-weight:700;
}

.list-section{
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 20px rgba(15,23,42,.05);
}

.search-box{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

.search-box select,
.search-box input{
    height:44px;
    border:1px solid #dbe3ec;
    border-radius:10px;
    padding:0 14px;
    font-size:14px;
    outline:none;
    transition:.2s;
}

.search-box select:focus,
.search-box input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.1);
}

.search-box button[type="submit"]{
    height:44px;
    padding:0 24px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

.search-box button[type="submit"]:hover{
    background:#1d4ed8;
}

.inquiry-table{
    width:100%;
    border-collapse:collapse;
}

.inquiry-table th{
    background:#f8fafc;
    padding:18px;
    text-align:center;
}

.inquiry-table td{
    padding:18px;
    text-align:center;
    border-bottom:1px solid #f1f5f9;
    white-space: nowrap;
}

.inquiry-table tbody tr{
    cursor:pointer;
}

.inquiry-table tbody tr:hover{
    background:#f8fafc;
}

.badge{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    min-width:90px;
    height:32px;
    border-radius:16px;
    font-size:13px;
    font-weight:700;
}

.waiting{
    background:#fff7ed;
    color:#ea580c;
    border:1px solid #fdba74;
}

.complete{
    background:#f0fdf4;
    color:#16a34a;
    border:1px solid #86efac;
}

.public-badge,
.private-badge{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    min-width:70px;
    height:32px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
}

.public-badge{
    background:#eef4ff;
    color:#2563eb;
    border:1px solid #bfdbfe;
}

.private-badge{
    background:#fef2f2;
    color:#dc2626;
    border:1px solid #fecaca;
}

.paging{
    display:flex;
    justify-content:center;
    gap:0;
    margin-top:25px;
}

.paging a{
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #e2e8f0;
    border-radius:0px;
    text-decoration:none;
    color:#475569;
    margin-left:-1px;   /* 테두리 겹침 */
}

.paging .active{
    background:#2563ff;
    color:white;
}

@media (max-width:1200px){

    .summary-wrap{
        grid-template-columns:repeat(2,1fr);
    }

}

@media (max-width:768px){

    .summary-wrap{
        grid-template-columns:1fr;
    }

    .search-box{
        flex-direction:column;
        align-items:stretch;
    }

    .search-box select,
    .search-box input,
    .search-box button{
        width:100%;
    }

    .list-section{
        overflow-x:auto;
    }

    .inquiry-table{
        min-width:1100px;
    }

}

.summary-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.summary-top i{
    font-size:48px;
    color:#94a3b8;
}

.search-result{
    margin:10px 0 15px;
    color:#64748b;
    font-size:14px;
}

/* 검색결과 + 선택삭제 한 줄 */
.list-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:15px 0;
    width:100%;
}

/* 검색 결과 */
.search-result{
    font-size:15px;
    color:#666;
}

.search-result strong{
    color:#4F6EF7;
    font-weight:700;
}

/* 선택 삭제 버튼 */
.delete-btn{
    background:#e74c3c !important;
    color:#fff;
    border:none;
}

.delete-btn:hover{
    background:#c0392b !important;
}

.search-box{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.search-btn-group{
    display:flex;
    gap:8px;
}

.list-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:18px 0 12px;
}

.search-result{
    min-height:20px;
}

.delete-btn{
    background:#e74c3c;
    color:#fff;
    border:none;
    border-radius:6px;
    padding:8px 16px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#c0392b;
}

.search-box input[type="date"]{
    width:119px;
}

.reset-btn{
    height:44px;
    min-width:80px;
    padding:0 20px;
    background:#fff !important;
    color:#374151 !important;
    border:1px solid #d1d5db !important;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
}

.reset-btn:hover{
    background:#f8fafc !important;
    border-color:#9ca3af !important;
    color:#111827 !important;
}

</style>

</head>
<body>
<div layout:fragment="content">

	<div class="page-header">
	    <div>
	        <h1>관리자 1:1 문의</h1>
	        <p>사용자가 등록한 문의를 조회하고 답변합니다.</p>
	    </div>
	</div>
	
	<div class="summary-wrap">
	    <div class="summary-card">
		    <div class="summary-top">
		        <div>
		            <h4>전체 문의</h4>
		            <strong th:text="${allCnt}">0</strong>
		        </div>
		        <i class="bi bi-chat-left-text"></i>
		    </div>
		</div>
	    <div class="summary-card">
		    <div class="summary-top">
		        <div>
		            <h4>답변 대기</h4>
		            <strong th:text="${pendingCnt}">0</strong>
		        </div>
		        <i class="bi bi-clock-history"></i>
		    </div>
		</div>
	    <div class="summary-card">
		    <div class="summary-top">
		        <div>
		            <h4>답변 완료</h4>
		            <strong th:text="${answeredCnt}">0</strong>
		        </div>
		        <i class="bi bi-check-circle"></i>
		    </div>
		</div>
	    <div class="summary-card">
		    <div class="summary-top">
		        <div>
		            <h4>오늘 등록</h4>
		            <strong th:text="${todayCnt}">0</strong>
		        </div>
		
		        <i class="bi bi-calendar3"></i>
		    </div>
		</div>
	</div>
	
	<div class="list-section">
	
		<form class="search-box" th:action="@{/questions/admin}" method="get">
		
		<select name="type">
			<option value="title" th:selected="${type=='title'}">제목</option>
			<option value="content" th:selected="${type=='content'}">내용</option>
		</select>
		
		<input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력하세요">
		
		<select name="status">
			<option value="">전체 문의</option>
			<option value="PENDING" th:selected="${status=='PENDING'}">답변 대기</option>
			<option value="ANSWERED" th:selected="${status=='ANSWERED'}">답변 완료</option>
		</select>
		
		<input type="date" name="startDate" th:value="${startDate}">
		~
		<input type="date" name="endDate" th:value="${endDate}">
		
		<div class="search-btn-group">
		<button type="submit">검색</button>
		<button type="button" class="reset-btn" onclick="resetSearch()">
		    초기화
		</button>
		</div>
		</form>
		
		<div class="list-top">
		    <div class="search-result">
		        <span th:if="${type != null or keyword != null or status != null or startDate != null or endDate != null}">
		            검색 결과 <strong th:text="${searchCnt}"></strong>건
		        </span>
		    </div>
		    <button type="button" class="delete-btn" onclick="deleteSelected()">
		        <i class="bi bi-trash3"></i> 선택 삭제
		    </button>
		</div>

		
		<table class="inquiry-table">
			<thead>
				<tr>
				<th><input type="checkbox" id="checkAll"></th>
				<th>번호</th>
				<th>작성자</th>
				<th>문의구분</th>
				<th>제목</th>
				<th>공개여부</th>
				<th>답변상태</th>
				<th>등록일</th>
				<th>답변일</th>
				</tr>
			</thead>
			
			<tbody>
			<tr th:if="${#lists.isEmpty(list)}">
				<td colspan="8">등록된 문의가 없습니다.</td>
			</tr>
			
			<tr th:each="q:${list}"
				th:onclick="|location.href='@{/questions/{id}(id=${q.questionId})}'|">
				<td onclick="event.stopPropagation();">
				<input type="checkbox" name="questionIds" th:value="${q.questionId}"></td>
				<td th:text="${q.questionId}"></td>
				<td th:text="${q.memberId}"></td>
				<td th:text="${q.category=='MEETUP'?'모임 문의':'관리자 문의'}"></td>
				<td th:text="${q.title}"></td>
				<td>
				    <span class="public-badge" th:if="${q.isPublic == 'Y'}">🔓 공개</span>
				    <span class="private-badge" th:if="${q.isPublic == 'N'}">🔒 비공개</span>
				</td>
				
				<td>
					<span class="badge waiting" th:if="${q.status=='PENDING'}">답변 대기</span>
					<span class="badge complete" th:if="${q.status=='ANSWERED'}">답변 완료</span>
				</td>
				
		        <td th:text="${#dates.format(q.createdAt, 'yyyy.MM.dd HH:mm:ss')}"></td>
		        <td th:text="${q.answer != null ? #dates.format(q.answer.createdAt,'yyyy.MM.dd HH:mm:ss') : '-'}"></td>	
	         </tr>
			
			</tbody>
		</table>
	
		<div class="paging" th:if="${totalPage > 0}">
			<a th:if="${startPage>1}"
				th:href="@{/questions/admin( page=${startPage-1}, type=${type}, keyword=${keyword}, 
							status=${status}, startDate=${startDate}, endDate=${endDate})}">
				이전
			</a>
			
			<a th:each="i:${#numbers.sequence(startPage,endPage)}"
				th:text="${i}"
				th:classappend="${page==i?' active':''}"
				th:href="@{/questions/admin( page=${i}, type=${type}, keyword=${keyword},
						 	status=${status}, startDate=${startDate}, endDate=${endDate})}">
			</a>
			
			<a th:if="${endPage<totalPage}"
				th:href="@{/questions/admin( page=${endPage+1}, type=${type}, keyword=${keyword},
				 			status=${status}, startDate=${startDate}, endDate=${endDate})}">
				다음
			</a>
		</div>
	
	</div>
<script>
	document.getElementById("checkAll").addEventListener("change", function () {
	    const checked = this.checked;
	    document.querySelectorAll("input[name='questionIds']").forEach(cb => {
	        cb.checked = checked;
	    });
	});
	function resetSearch() {
	    document.querySelector("select[name='type']").selectedIndex = 0;
	    document.querySelector("input[name='keyword']").value = "";
	    document.querySelector("select[name='status']").selectedIndex = 0;
	    document.querySelector("input[name='startDate']").value = "";
	    document.querySelector("input[name='endDate']").value = "";
	}
	// 개별 체크박스 클릭 시 전체 선택 상태 변경
    document.querySelectorAll("input[name='questionIds']").forEach(cb => {
        cb.addEventListener("change", function () {
            const all = document.querySelectorAll("input[name='questionIds']");
            const checked = document.querySelectorAll("input[name='questionIds']:checked");
            document.getElementById("checkAll").checked = all.length === checked.length;
        });
    });
	function deleteSelected(){
	    const ids=[];
	    document.querySelectorAll("input[name='questionIds']:checked").forEach(cb=>{ ids.push(cb.value); });
	    if(ids.length==0){ alert("삭제할 문의를 선택하세요."); return; }
	    if(!confirm("선택한 문의를 삭제하시겠습니까?")){ return; }
	    fetch("/questions/deleteSelected",{
	        method:"POST",
	        headers:{
	            "Content-Type":"application/json"
	        },
	        body:JSON.stringify(ids)
	    }).then(response => {
	        if (response.ok) {
	            alert("삭제가 완료되었습니다.");
	            location.reload();
	        } else {
	            alert("삭제 실패");
	        }
	    });
	}
</script>
</div>
</body>
</html>
